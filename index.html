<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Intel | Business Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase CDN Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; background-color: #01030a; position: relative; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; }

        /* Highly Visible Glowing Matrix Background Wrapper */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.85; /* Increased drastically for clear visibility */
        }

        /* Currency Stream Vertical Column Waterfall Animation */
        .currency-stream {
            position: absolute;
            top: -1000px;
            font-family: monospace;
            font-weight: 900;
            color: #00d2ff;
            /* Ultra sharp glowing neon drop shadows */
            text-shadow: 0 0 10px #00d2ff, 0 0 25px #2563eb, 0 0 40px rgba(37,99,235,0.8);
            writing-mode: vertical-rl; 
            text-orientation: upright;
            letter-spacing: 8px;
            line-height: 1;
            animation: rain linear infinite; /* Fixed naming syntax to fix stalling waterfall */
        }

        @keyframes rain {
            0% { top: -1000px; opacity: 0; }
            5% { opacity: 0.3; }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="font-sans">

    <!-- CYBERPUNK GLOWING CURRENCY BACKGROUND LAYER -->
    <div class="matrix-bg" id="matrixBg"></div>

    <!-- MAIN INTERFACE CONTAINER (Uses Backdrop Blurs to mesh panels beautifully with the glowing background) -->
    <div class="relative z-10 flex flex-col h-full w-full backdrop-blur-[2px]">
        
        <!-- HEADER LOGO BAR -->
        <header class="bg-slate-950/40 border-b border-slate-900 px-8 py-4 flex items-center justify-between backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-xs shadow-[0_0_15px_rgba(37,99,235,0.7)]">FI</div>
                <span class="font-bold text-slate-100 tracking-tight">Financial Intelligence Terminal</span>
            </div>
            <a href="index.html" class="text-xs text-slate-400 hover:text-white transition-colors">← Back to Login</a>
        </header>

        <!-- MAIN INTERFACE MATRIX -->
        <main class="flex-1 grid grid-cols-4 gap-4 p-4 h-full overflow-hidden">
            
            <!-- LEFT CONTROL DRAWER (Translucent background overlay) -->
            <div class="col-span-1 bg-slate-950/20 p-6 border border-slate-900/60 flex flex-col h-full overflow-y-auto backdrop-blur-md rounded-xl shadow-2xl">
                <h3 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> Financial Sectors
                </h3>
                
                <div id="categoryContainer" class="space-y-4 mb-6">
                    <!-- ETHIOPIAN DISPATCH DEPT -->
                    <div>
                        <label class="block bg-slate-950/60 hover:bg-slate-900 border border-slate-800 p-3 rounded cursor-pointer transition-all">
                            <input type="checkbox" id="ethToggle" class="cat-check" value="ethiopian"> <span class="text-xs font-bold uppercase ml-2">Ethiopian news</span>
                        </label>
                        <div id="ethSources" class="hidden mt-2 ml-4 space-y-1 border-l border-blue-500/40 pl-3"></div>
                    </div>

                    <!-- INTERNATIONAL DISPATCH DEPT -->
                    <div>
                        <label class="block bg-slate-950/60 hover:bg-slate-900 border border-slate-800 p-3 rounded cursor-pointer transition-all">
                            <input type="checkbox" id="intToggle" class="cat-check" value="international"> <span class="text-xs font-bold uppercase ml-2">International</span>
                        </label>
                        <div id="intSources" class="hidden mt-2 ml-4 space-y-1 border-l border-blue-500/40 pl-3"></div>
                    </div>
                </div>
                
                <!-- STREAM MONITOR FEED -->
                <div class="flex-1 bg-slate-950/40 rounded-xl border border-slate-900 p-4 mb-4 overflow-y-auto">
                    <h3 class="text-[9px] font-bold text-slate-400 uppercase mb-3">Active Data Streams</h3>
                    <div id="activeSourceList" class="space-y-2 font-mono text-[10px] text-slate-500 italic">// Awaiting stream...</div>
                </div>

                <button id="runBtn" class="w-full bg-blue-600 p-4 rounded-xl font-black text-xs uppercase hover:bg-blue-500 transition-all cursor-pointer shadow-[0_0_15px_rgba(37,99,235,0.4)]">Initialize Pipeline</button>
            </div>

            <!-- RIGHT RUN TIME VIEWER (Translucent background overlay) -->
            <div class="col-span-3 bg-slate-950/20 p-6 border border-slate-900/60 flex flex-col h-full overflow-y-auto backdrop-blur-md rounded-xl shadow-2xl">
                <h3 class="font-bold text-sm text-slate-300 mb-4 flex items-center gap-2">Financial Intelligence Matrix</h3>
                
                <!-- FAST INTEL BAR -->
                <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-900 w-full mb-4 backdrop-blur-md">
                    <h3 class="text-[9px] font-bold text-red-500 uppercase mb-2 flex items-center gap-1.5">
                        <span class="w-1 h-1 rounded-full bg-red-500 animate-ping"></span> Fast Hot News
                    </h3>
                    <div class="flex gap-2">
                        <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950 border border-slate-900 rounded p-2 text-[10px] text-white focus:border-red-500 outline-none">
                        <button id="hotNewsBtn" class="bg-red-600 px-4 py-1 rounded font-bold text-[10px] uppercase hover:bg-red-500 cursor-pointer transition-colors">Go</button>
                    </div>
                </div>

                <!-- REGIONAL LANGUAGE FILTER TOOL -->
                <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-900 w-full flex items-center gap-4 mb-4 backdrop-blur-md">
                    <button id="selectAllBtn" class="bg-blue-900/20 hover:bg-blue-600 border border-blue-500/30 text-blue-400 hover:text-white px-4 py-2 rounded font-black text-[10px] uppercase transition-all cursor-pointer">Select All</button>
                    <div class="flex gap-4 flex-wrap">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="oromiffa"> <span class="text-xs font-bold uppercase text-slate-300 hover:text-white">Oromiffa</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="amharic"> <span class="text-xs font-bold uppercase text-slate-300 hover:text-white">Amharic</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="english"> <span class="text-xs font-bold uppercase text-slate-300 hover:text-white">English</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="arabic"> <span class="text-xs font-bold uppercase text-slate-300 hover:text-white">Arabic</span></label>
                    </div>
                </div>

                <!-- CONSOLE OUTPUT MONITOR -->
                <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950/70 rounded-lg p-6 border border-slate-900 font-mono text-xs text-blue-400 shadow-inner backdrop-blur-md">
                    <p class="text-slate-500 italic">// System ready for financial data... </p>
                </div>
            </div>
        </main>
    </div>

    <!-- BACKEND APPLICATION LAYER & BACKGROUND ANIMATION LOGIC -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

        // 1. GENERATE VERTICAL FALLING CURRENCY WATERFALL
        const currencies = ['$', '€', 'Br', '¥', '元', '﷼', '£', 'د.إ', 'रू'];
        const bgContainer = document.getElementById('matrixBg');
        const columnCount = 28; // Spreads streams dense across background width

        for (let i = 0; i < columnCount; i++) {
            const stream = document.createElement('div');
            stream.className = 'currency-stream';
            
            // Build random vertical drops filled with currencies
            let streamContent = '';
            const streamLength = Math.floor(Math.random() * 20) + 20; // Long vertical strings
            for (let j = 0; j < streamLength; j++) {
                streamContent += currencies[Math.floor(Math.random() * currencies.length)];
            }
            stream.textContent = streamContent;
            
            // Layout distribution parameters
            stream.style.left = `${i * (100 / columnCount)}%`;
            stream.style.fontSize = `${Math.floor(Math.random() * 6) + 14}px`;
            stream.style.animationDuration = `${Math.floor(Math.random() * 6) + 5}s`; // Rapid water flow pace
            stream.style.animationDelay = `${Math.random() * -12}s`;
            
            bgContainer.appendChild(stream);
        }

        // 2. SUPABASE API DATA LAYER CONNECT
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        });

        async function loadSourcesFromDB() {
            try {
                const { data: ethData, error: ethErr } = await supabaseClient
                    .from('Ethiopian -Business and finance websites')
                    .select('"Website -source", websites');
                    
                const { data: intData, error: intErr } = await supabaseClient
                    .from('business and finance -websites')
                    .select('"website Source", websites');

                if(ethErr) console.error("Ethiopian Database Load Error:", ethErr);
                if(intErr) console.error("International Database Load Error:", intErr);

                const buildList = (data, containerId, className, colName) => {
                    const container = document.getElementById(containerId);
                    if (!data) return;
                    container.innerHTML = '';
                    
                    data.forEach(item => {
                        const label = document.createElement('label');
                        label.className = "flex items-center gap-2 text-[10px] py-1 cursor-pointer hover:text-blue-400 text-slate-300 transition-colors";
                        label.innerHTML = `<input type="checkbox" class="${className}" value="${item.websites}"> <span>${item[colName]}</span>`;
                        container.appendChild(label);
                    });
                };

                buildList(ethData, 'ethSources', 'eth-src', 'Website -source');
                buildList(intData, 'intSources', 'int-src', 'website Source');
                
            } catch (err) {
                console.error("Critical structural error:", err);
            }
        }

        loadSourcesFromDB();

        // 3. UI TERMINAL TOGGLES
        document.getElementById('ethToggle').addEventListener('change', (e) => {
            document.getElementById('ethSources').classList.toggle('hidden', !e.target.checked);
        });
        
        document.getElementById('intToggle').addEventListener('change', (e) => {
            document.getElementById('intSources').classList.toggle('hidden', !e.target.checked);
        });

        document.getElementById('selectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.lang-check').forEach(c => c.checked = true);
        });

        document.getElementById('hotNewsBtn').addEventListener('click', () => {
            const topic = document.getElementById('hotNewsInput').value.trim();
            document.getElementById('outputContainer').innerHTML = `<div class="text-red-400 font-mono">// INTEL CHANNELS INITIALIZED FOR SEARCH MATRIX: ${topic || 'GLOBAL RUN'}...</div>`;
        });
        
        document.getElementById('runBtn').onclick = () => {
            const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                .filter(c => c.className.includes('-src'))
                .map(c => c.parentElement.querySelector('span').textContent.trim());
            
            if (selected.length === 0) return alert("Error: Select at least one active pipeline node.");
            
            document.getElementById('activeSourceList').innerHTML = selected.map(item => `<div class="p-2 bg-slate-900/90 rounded border-l-2 border-blue-500 text-blue-300 font-mono">» ${item}</div>`).join('');
            document.getElementById('outputContainer').innerHTML = `<div class="text-emerald-400 font-mono">// PIPELINE ACTIVE & AUTHENTICATED WITH POSTGREST LAYER<br>// STREAM NODES LISTENING: ${selected.join(', ')}</div>`;
        };
    </script>
</body>
</html>

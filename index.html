<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Analytics Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            margin: 0; 
            color: #f1f5f9; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            background-color: #010412;
            position: relative;
            overflow: hidden;
        }

        /* CYBER PLATFORM RUNNING TRACK CONTAINER */
        .cyber-arena {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(to bottom, #010412 40%, #03102d 100%);
        }

        /* Perspective Grid Ground for the running platform */
        .cyber-grid {
            position: absolute;
            width: 100%;
            height: 60%;
            bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(5, 150, 105, 0.15) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(5, 150, 105, 0.15) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: perspective(300px) rotateX(65deg);
            transform-origin: top center;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 80%);
        }

        /* Glowing finish line or track limits */
        .track-lanes {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) perspective(300px) rotateX(65deg);
            transform-origin: top center;
            width: 600px;
            height: 100%;
            border-left: 4px solid rgba(16, 185, 129, 0.4);
            border-right: 4px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }

        /* 4 CYBER RUNNER WIREFRAME AVATARS */
        .runner-group {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 250px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 50px;
        }

        .cyber-runner {
            width: 90px;
            height: 160px;
            opacity: 0.35;
            filter: drop-shadow(0 0 12px currentColor);
            animation: sprint 0.6s infinite alternate ease-in-out;
        }

        /* Staggering the sprinting animations so they look realistic */
        .runner-1 { color: #10b981; animation-delay: 0.1s; }
        .runner-2 { color: #34d399; animation-delay: 0.3s; }
        .runner-3 { color: #059669; animation-delay: 0.0s; }
        .runner-4 { color: #00f2fe; animation-delay: 0.4s; }

        /* Dynamic sprinting motion simulating running towards the front */
        @keyframes sprint {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            100% { transform: translateY(-12px) scale(1.05); opacity: 0.55; }
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #059669; border-radius: 5px; }
    </style>
</head>
<body class="font-sans">

    <!-- CYBER PLATFORM BACKGROUND MATRIX WITH 4 ANIMATED RUNNERS -->
    <div class="cyber-arena">
        <div class="cyber-grid"></div>
        <div class="track-lanes"></div>
        
        <!-- Vector-based dynamic runner shapes racing forward -->
        <div class="runner-group">
            <!-- Runner 1 -->
            <svg class="cyber-runner runner-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="4" r="2"/>
                <path d="M4 14h6v6"/>
                <path d="m14 14 3-3-3-3h-4l-2 3"/>
                <path d="M11 20v-6l-3-3"/>
            </svg>
            <!-- Runner 2 -->
            <svg class="cyber-runner runner-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="4" r="2"/>
                <path d="M4 14h6v6"/>
                <path d="m14 14 3-3-3-3h-4l-2 3"/>
                <path d="M11 20v-6l-3-3"/>
            </svg>
            <!-- Runner 3 -->
            <svg class="cyber-runner runner-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="4" r="2"/>
                <path d="M4 14h6v6"/>
                <path d="m14 14 3-3-3-3h-4l-2 3"/>
                <path d="M11 20v-6l-3-3"/>
            </svg>
            <!-- Runner 4 -->
            <svg class="cyber-runner runner-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="4" r="2"/>
                <path d="M4 14h6v6"/>
                <path d="m14 14 3-3-3-3h-4l-2 3"/>
                <path d="M11 20v-6l-3-3"/>
            </svg>
        </div>
    </div>

    <!-- MAIN TERMINAL APP FRAME -->
    <div class="relative z-10 flex flex-col h-full w-full">
        
        <!-- HEADER TOOLBAR (Heavy 4px Framing Edge) -->
        <header class="bg-slate-950/90 border-b-4 border-slate-800 px-8 py-4 flex items-center justify-between backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-md bg-emerald-600 flex items-center justify-center font-bold text-xs border-2 border-emerald-400">AI</div>
                <span class="font-medium text-slate-100 tracking-tight text-base">Sports Analytics Terminal</span>
            </div>
        </header>

        <!-- MAIN INTERFACE MATRIX -->
        <main class="flex-1 grid grid-cols-4 gap-5 p-5 h-full overflow-hidden">
            
            <!-- LEFT CONTROL DRAWER (Heavy 4px framing edge, regular interior text) -->
            <div class="col-span-1 bg-slate-950/90 p-6 border-4 border-slate-800 flex flex-col h-full overflow-y-auto rounded-2xl shadow-2xl backdrop-blur-sm">
                <h3 class="text-[11px] font-medium text-emerald-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Select Categories
                </h3>
                
                <div id="categoryContainer" class="space-y-4 mb-6">
                    <button onclick="toggleAll('.cat-check', true)" class="w-full bg-emerald-950/50 hover:bg-emerald-600 border-4 border-emerald-500 text-emerald-400 hover:text-white px-4 py-3 rounded-xl font-medium text-xs uppercase transition-all mb-2 cursor-pointer">
                        Select All Categories
                    </button>

                    <label class="block bg-slate-900/90 border-4 border-slate-700 p-4 rounded-xl cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-125 accent-emerald-600" value="epl"> <span class="text-xs font-normal uppercase ml-2 text-slate-300">Ethiopian Premier League</span>
                    </label>
                    <label class="block bg-slate-900/90 border-4 border-slate-700 p-4 rounded-xl cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-125 accent-emerald-600" value="international"> <span class="text-xs font-normal uppercase ml-2 text-slate-300">International</span>
                    </label>
                    <label class="block bg-slate-900/90 border-4 border-slate-700 p-4 rounded-xl cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-125 accent-emerald-600" value="athletics"> <span class="text-xs font-normal uppercase ml-2 text-slate-300">Athletics</span>
                    </label>
                    <label class="block bg-slate-900/90 border-4 border-slate-700 p-4 rounded-xl cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-125 accent-emerald-600" value="others"> <span class="text-xs font-normal uppercase ml-2 text-slate-300">Others</span>
                    </label>
                </div>

                <!-- ACTIVE LIVE MONITOR LIST -->
                <div class="flex-1 bg-slate-950 rounded-xl border-4 border-slate-800/80 p-4 mb-4 overflow-y-auto">
                    <h3 class="text-[9px] font-medium text-slate-400 uppercase mb-3">Active Sources</h3>
                    <div id="activeSourceList" class="space-y-2 font-mono text-[10px] text-slate-500 italic">// Waiting for pipeline...</div>
                </div>

                <button id="runBtn" class="w-full bg-emerald-600 border-4 border-emerald-400 p-4 rounded-xl font-medium text-xs uppercase hover:bg-emerald-500 transition-all cursor-pointer shadow-md tracking-wider">Fire Pipeline</button>
            </div>

            <!-- RIGHT MONITOR SCREEN DISPLAY (Heavy 4px framing edge, regular interior text) -->
            <div class="col-span-3 bg-slate-950/85 p-6 border-4 border-slate-800 flex flex-col h-full overflow-y-auto rounded-2xl shadow-2xl backdrop-blur-sm">
                <div class="mb-6">
                    <h3 class="font-medium text-sm text-slate-300 mb-4">Scrapped Intelligence Matrix</h3>
                    
                    <!-- FAST HOT NEWS ENGINE -->
                    <div class="bg-slate-900 border-4 border-slate-800 p-4 rounded-xl w-full mb-4">
                        <h3 class="text-[10px] font-medium text-rose-500 uppercase mb-2 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-ping"></span> Fast Hot News
                        </h3>
                        <div class="flex gap-3">
                            <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950 border-4 border-slate-800 rounded-xl p-3 text-xs text-white focus:border-rose-500 outline-none">
                            <button onclick="getHotNews()" class="bg-rose-600 border-4 border-rose-400 px-6 py-2 rounded-xl font-medium text-xs uppercase hover:bg-rose-500 cursor-pointer transition-colors">Go</button>
                        </div>
                    </div>
                    
                    <!-- UTILITY LANGUAGE SELECTION TOOLBAR -->
                    <div class="bg-slate-900 border-4 border-slate-800 p-4 rounded-xl w-full flex justify-between items-center flex-wrap gap-4">
                        <div class="flex gap-4 flex-wrap">
                            <button onclick="toggleAll('.lang-check', true)" class="bg-emerald-950 hover:bg-emerald-600 border-4 border-emerald-500 text-emerald-400 hover:text-white px-5 py-2.5 rounded-xl font-medium text-xs uppercase transition-all cursor-pointer">Select All</button>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950 py-2 px-4 border-4 border-slate-800 rounded-xl hover:border-slate-600"><input type="checkbox" class="lang-check scale-125 accent-emerald-500" value="oromifa"> <span class="text-xs font-normal uppercase text-slate-400">Oromifa</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950 py-2 px-4 border-4 border-slate-800 rounded-xl hover:border-slate-600"><input type="checkbox" class="lang-check scale-125 accent-emerald-500" value="amharic"> <span class="text-xs font-normal uppercase text-slate-300">Amharic</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950 py-2 px-4 border-4 border-slate-800 rounded-xl hover:border-slate-600"><input type="checkbox" class="lang-check scale-125 accent-emerald-500" value="english"> <span class="text-xs font-normal uppercase text-slate-300">English</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950 py-2 px-4 border-4 border-slate-800 rounded-xl hover:border-slate-600"><input type="checkbox" class="lang-check scale-125 accent-emerald-500" value="arabic"> <span class="text-xs font-normal uppercase text-slate-300">Arabic</span></label>
                        </div>
                        <button onclick="downloadData()" class="bg-blue-600 border-4 border-blue-400 px-6 py-2.5 rounded-xl font-medium text-xs uppercase shadow-md hover:bg-blue-500 transition-all cursor-pointer">Download</button>
                    </div>
                </div>

                <!-- MAIN LOGGER CONSOLE HOUSING -->
                <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950/95 rounded-xl p-6 border-4 border-slate-900 font-mono text-xs text-emerald-400 shadow-inner">
                    <p class="text-slate-500 italic font-normal">// Matrix ready for sports intelligence ingestion...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- PIPELINE SCRIPT CONNECTIONS -->
    <script>
        function toggleAll(selector, isChecked) { document.querySelectorAll(selector).forEach(c => c.checked = isChecked); }
        function getHotNews() { document.getElementById('outputContainer').innerHTML = `<div class="text-rose-500 font-mono">// Querying global sports wire feeds...</div>`; }
        
        document.getElementById('runBtn').onclick = () => {
            const mainCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);
            const sourceList = document.getElementById('activeSourceList');
            const output = document.getElementById('outputContainer');

            if (mainCats.length === 0) return alert("Select at least one active intelligence sector category.");

            sourceList.innerHTML = mainCats.map(item => 
                `<div class="p-2 bg-slate-900 rounded-lg border-2 border-emerald-500 text-emerald-300 font-mono text-xs">» ${item.toUpperCase()}</div>`
            ).join('');

            output.innerHTML = `<div class="text-emerald-400 font-mono">// SYSTEM INTELLIGENCE STREAM COUPLING COMPLETED<br>// CAPTURING ACTIVE NODES: ${mainCats.join(', ').toUpperCase()}</div>`;
        };

        function downloadData() {
            const data = document.getElementById('outputContainer').innerText;
            const blob = new Blob([data], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sports-scrapped-intel.txt'; a.click();
        }
    </script>
</body>
</html>

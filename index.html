<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #02071a; margin: 0; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .glow-border:focus-within { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        input:focus, select:focus { outline: none !important; box-shadow: none !important; }
        select option { background-color: #020617; color: #f8fafc; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans relative">

    <div id="canvas-container"></div>

    <div id="signUpScreen" class="flex-1 flex items-center justify-center p-6 relative z-10">
        <div class="max-w-md w-full bg-slate-950/50 backdrop-blur-xl p-8 rounded-2xl border border-sky-500/20 relative overflow-hidden">
            <h2 class="text-2xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-white to-sky-200 mb-1">Initialize Agent Access</h2>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg p-3 text-sm">
                <select id="regSection" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg p-3 text-slate-300 text-sm">
                    <option value="World Politics and Governance">World Politics and Governance</option>
                    <option value="Sports & Analytics">Sports & Analytics</option>
                    <option value="Business and Finance">Business and Finance</option>
                    <option value="General Hot News">General Hot News</option>
                </select>
                <input type="password" id="regPassword" placeholder="Password" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg p-3 text-sm">
                <button id="signUpBtn" class="w-full bg-sky-600 text-white py-3 rounded-lg font-mono text-xs uppercase cursor-pointer">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="signInScreen" class="hidden flex-1 flex items-center justify-center p-6 relative z-10">
        <div class="max-w-md w-full bg-slate-950/50 backdrop-blur-xl p-8 rounded-2xl border border-sky-500/20 relative overflow-hidden">
            <h2 class="text-2xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-white to-sky-200 mb-6">Operator Portal</h2>
            <div class="space-y-4">
                <input type="text" id="loginName" placeholder="Full Name" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg p-3 text-sm text-white">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg p-3 text-sm text-white">
                <button id="signInBtn" class="w-full bg-sky-600 text-white py-3 rounded-lg font-mono text-xs uppercase cursor-pointer">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden flex-1 flex flex-col relative z-10">
        <header class="p-8 flex justify-between items-center">
            <h1 id="portalTitle" class="text-xl font-bold tracking-tight">Automation Control Hub</h1>
            <button id="logoutBtn" class="text-rose-400 text-xs font-mono border border-rose-900 px-3 py-1 rounded">Logout</button>
        </header>
        <main class="max-w-7xl w-full mx-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-950/50 p-6 rounded-2xl border border-slate-800">
                <input type="text" id="keywords" placeholder="Keywords..." class="w-full bg-slate-950 border border-slate-700 p-2 rounded mb-4 text-sm">
                <button id="runBtn" class="w-full bg-emerald-600 p-3 rounded font-bold text-xs uppercase font-mono">Fire Automation</button>
            </div>
            <div class="bg-slate-950/50 p-6 rounded-2xl border border-slate-800 font-mono text-xs overflow-auto h-64">
                <pre id="jsonDisplay"></pre>
            </div>
        </main>
    </div>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY, N8N_CONTENT_URL, DEV_MODE_OVERRIDE } from './config.js';
        import { DESK_CONFIGS } from './deskConfigs.js';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentSessionOperator = { name: "", section: "" };
        let scene, camera, renderer, globeGroup, pointCloud;

        // Initialize Globe
        function initCyberGlobe() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 200;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            globeGroup = new THREE.Group();
            scene.add(globeGroup);
            const geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(5000 * 3);
            for(let i=0; i<5000*3; i++) pos[i] = (Math.random()-0.5)*200;
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            pointCloud = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x38bdf8, size: 1 }));
            globeGroup.add(pointCloud);
            animate();
        }

        function animate() { requestAnimationFrame(animate); globeGroup.rotation.y += 0.005; renderer.render(scene, camera); }

        function morphDashboardUI(section) {
            const key = (section || "").toLowerCase().trim();
            const config = DESK_CONFIGS[key] || DESK_CONFIGS["default"];
            document.getElementById("portalTitle").textContent = config.title;
            // Set Green for Sports, Blue for others
            if(pointCloud) pointCloud.material.color.setHex(key.includes("sports") ? 0x22c55e : 0x38bdf8);
        }

        function showScreen(id) {
            ['signUpScreen', 'signInScreen', 'dashboardScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('signInBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const { data } = await supabaseClient.from('journalists').select('*').eq('Journalist name', name);
            if(data?.length > 0) {
                currentSessionOperator = { name: data[0]["Journalist name"], section: data[0]["journalism Section"] };
                morphDashboardUI(currentSessionOperator.section);
                showScreen('dashboardScreen');
            }
        };

        document.getElementById('logoutBtn').onclick = () => showScreen('signInScreen');
        initCyberGlobe();
        showScreen('signInScreen');

        // Force route to Sports if in Dev mode
        if (DEV_MODE_OVERRIDE === "SPORTS") {
            morphDashboardUI("Sports & Analytics");
            showScreen('dashboardScreen');
        }
    </script>
</body>
</html>

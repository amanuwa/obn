<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway Access | Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase CDN Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; color: #f1f5f9; height: 100vh; display: flex; items-center justify-content: center; background-color: #010206; font-family: monospace; position: relative; overflow: hidden; }
        
        /* Subtle scanlines for terminal texture */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 5;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           ROTATING HOLOGRAM GLOBE BACKGROUND
           ------------------------------------------------------------- */
        .globe-bg-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vh;
            height: 85vh;
            max-width: 90vw;
            max-height: 90vw;
            z-index: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rotating-globe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.45; /* Blends nicely into the dark layout without blinding text */
            filter: drop-shadow(0 0 30px rgba(6, 182, 212, 0.3));
            animation: slowGlobeSpin 40s linear infinite;
        }

        @keyframes slowGlobeSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ------------------------------------------------------------- */

        .auth-card {
            background: rgba(6, 11, 24, 0.85); /* Slightly translucent to see the globe spin underneath */
            border: 1px solid #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.25);
            backdrop-filter: blur(6px); /* Blurs the globe under the card for readability */
        }

        .terminal-input {
            background-color: #02050c;
            border: 1px solid #1e293b;
            color: #f1f5f9;
            transition: all 0.2s ease;
        }
        .terminal-input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- ROTATING GLOBE BACKDROP -->
    <div class="globe-bg-wrapper">
        <img src="Screenshot 2026-07-08 004611.jpg" alt="Hologram Globe" class="rotating-globe">
    </div>

    <!-- COMPACT TERMINAL LOCKBOX -->
    <div class="auth-card w-full max-w-md rounded-xl p-6 relative z-10">
        <!-- Header Matrix Identity -->
        <div class="flex items-center gap-3 border-b border-slate-800 pb-4 mb-5">
            <div class="w-8 h-8 rounded bg-cyan-600 flex items-center justify-center font-bold text-xs text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.4)]">🔑</div>
            <div>
                <h1 class="text-sm font-bold text-slate-100 uppercase tracking-wider">Gateway Authentication</h1>
                <span class="text-[10px] text-cyan-500 uppercase tracking-widest">// ACCESS DETERMINATION NODE</span>
            </div>
        </div>

        <!-- System Alerts Console -->
        <div id="authAlert" class="hidden text-[11px] p-2.5 rounded border mb-4 bg-slate-950 font-mono"></div>

        <!-- Access Credentials Form -->
        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase text-slate-400 tracking-wider mb-1.5">// Identity Email</label>
                <input type="email" id="email" required placeholder="operator@domain.com" class="terminal-input w-full px-3 py-2 text-xs rounded-md font-mono">
            </div>

            <div>
                <label class="block text-[10px] uppercase text-slate-400 tracking-wider mb-1.5">// Security Passkey</label>
                <input type="password" id="password" required placeholder="••••••••••••" class="terminal-input w-full px-3 py-2 text-xs rounded-md font-mono">
            </div>

            <div class="pt-2 flex flex-col gap-2.5">
                <!-- Action Executioners -->
                <button type="submit" id="btnLogin" class="w-full bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-bold text-xs py-2 rounded-md transition-all uppercase tracking-wide cursor-pointer shadow-[0_0_12px_rgba(6,182,212,0.2)]">
                    Authorize Session [Sign In]
                </button>
                
                <button type="button" id="btnRegister" class="w-full border border-slate-800 hover:border-cyan-900/50 bg-slate-950/40 hover:bg-cyan-950/10 text-slate-400 hover:text-cyan-400 font-mono text-[11px] py-1.5 rounded transition-all uppercase tracking-wide cursor-pointer">
                    Provision New Access [Sign Up]
                </button>
            </div>
        </form>

        <!-- Footer Metric Status -->
        <div class="mt-5 pt-3 border-t border-slate-900 flex justify-between items-center text-[9px] text-slate-600">
            <span>SECURE LINK SEC-V5</span>
            <span id="systemClock">// WAITING FOR OPERATOR INITIALS</span>
        </div>
    </div>

    <!-- CORE CONFIGURATION & SUPABASE GLUE -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

        // Initialize connection layers
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const alertBox = document.getElementById('authAlert');
        const systemClock = document.getElementById('systemClock');

        function displayNotice(msg, type = 'info') {
            alertBox.classList.remove('hidden', 'text-cyan-400', 'border-cyan-900/50', 'text-red-400', 'border-red-950/60', 'text-emerald-400', 'border-emerald-950/60');
            
            if (type === 'error') {
                alertBox.classList.add('text-red-400', 'border-red-950/60');
            } else if (type === 'success') {
                alertBox.classList.add('text-emerald-400', 'border-emerald-950/60');
            } else {
                alertBox.classList.add('text-cyan-400', 'border-cyan-900/50');
            }
            alertBox.innerText = `// ${msg.toUpperCase()}`;
        }

        // SIGN IN LOGIC SEQUENCE
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            systemClock.innerText = "// COMMENCING TOKENS EXTRACTION...";
            displayNotice("Verifying crypto credentials sequence...", "info");

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: emailInput.value.trim(),
                    password: passwordInput.value
                });

                if (error) throw error;

                displayNotice("Identity authenticated. Redirecting to workspace interface...", "success");
                systemClock.innerText = "// SESSION ESTABLISHED.";
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html'; 
                }, 1000);

            } catch (err) {
                displayNotice(err.message || "Authorization rejected.", "error");
                systemClock.innerText = "// ACCESS DENIED.";
            }
        });

        // SIGN UP NEW ACCOUNTS PIPELINE
        document.getElementById('btnRegister').addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                displayNotice("Complete credential input arrays first.", "error");
                return;
            }

            systemClock.innerText = "// PROVISIONING MATRIX ENTRY...";
            displayNotice("Registering terminal operator identity profile...", "info");

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password
                });

                if (error) throw error;

                displayNotice("Identity provisioned. Confirm link verification email if active, or authorize sign in.", "success");
                systemClock.innerText = "// RECORD WRITTEN.";
            } catch (err) {
                displayNotice(err.message || "Provisioning sequence failure.", "error");
                systemClock.innerText = "// HANDSHAKE ABORTED.";
            }
        });
    </script>
</body>
</html>

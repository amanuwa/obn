<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Analytics Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #02071a; margin: 0; color: #f1f5f9; }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #059669; border: 2px solid #0f172a; border-radius: 6px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <header class="bg-slate-950/60 backdrop-blur-md border-b border-slate-850 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center font-black text-xs">AI</div>
            <span class="font-bold text-slate-100 tracking-tight">Sports Analytics Terminal</span>
        </div>
    </header>

    <main class="max-w-[95%] w-full mx-auto grid grid-cols-4 gap-6 p-8 flex-1">
        
        <!-- LEFT: CATEGORIES -->
        <div class="col-span-1 bg-slate-950/50 p-6 rounded-2xl border border-slate-800 h-[650px] flex flex-col shadow-2xl">
            <h3 class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-4">Select Categories</h3>
            <div id="categoryContainer" class="space-y-3 mb-8">
                <label class="flex items-center gap-2 cursor-pointer hover:text-emerald-400">
                    <input type="checkbox" id="selectAllCats" onclick="toggleAll('.cat-check', this.checked)" class="accent-emerald-600 w-4 h-4"> 
                    <span class="text-sm font-bold">Select All Categories</span>
                </label>
                <div class="flex items-center gap-2"><input type="checkbox" class="cat-check" value="epl"> <span class="text-sm">Ethiopian Premier League</span></div>
                <div class="flex items-center gap-2"><input type="checkbox" class="cat-check" value="international"> <span class="text-sm">International</span></div>
                <div class="flex items-center gap-2"><input type="checkbox" class="cat-check" value="athletics"> <span class="text-sm">Athletics</span></div>
                <div class="flex items-center gap-2"><input type="checkbox" class="cat-check" value="others"> <span class="text-sm">Others</span></div>
            </div>
            <button id="runBtn" class="w-full mt-auto bg-emerald-600 p-4 rounded-xl font-black text-xs uppercase hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/40">Fire Pipeline</button>
        </div>

        <!-- RIGHT: MATRIX -->
        <div class="col-span-3 bg-slate-950/50 p-6 rounded-2xl border border-slate-800 flex flex-col h-[650px] shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <h3 class="font-bold text-sm text-slate-300">Scrapped Intelligence Matrix</h3>
                
                <!-- RIGHT SIDE CONTROLS -->
                <div class="flex flex-col gap-4">
                    
                    <!-- FAST HOT NEWS (Positioned before language selection) -->
                    <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 min-w-[220px]">
                        <h3 class="text-[9px] font-bold text-rose-500 uppercase mb-2">Fast Hot News</h3>
                        <div class="flex gap-2">
                            <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950 border border-slate-800 rounded p-2 text-[10px] text-white focus:border-rose-500 outline-none">
                            <button onclick="getHotNews()" class="bg-rose-600 px-3 py-1 rounded font-bold text-[10px] uppercase hover:bg-rose-500">Go</button>
                        </div>
                    </div>

                    <!-- THICK LANGUAGE SELECTION PANEL -->
                    <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 min-w-[220px]">
                        <button onclick="toggleAll('.lang-check', true)" class="w-full mb-2 bg-slate-800 hover:bg-slate-700 text-[10px] font-bold uppercase p-2 rounded border border-emerald-500/50 text-emerald-400">Select All Languages</button>
                        <div id="langList" class="space-y-1">
                            <label class="flex items-center gap-3 p-2 hover:bg-slate-800 rounded cursor-pointer border-l-2 border-transparent hover:border-emerald-500">
                                <input type="checkbox" class="lang-check" value="oromifa"> <span class="text-xs font-medium">Oromifa</span>
                            </label>
                            <label class="flex items-center gap-3 p-2 hover:bg-slate-800 rounded cursor-pointer border-l-2 border-transparent hover:border-emerald-500">
                                <input type="checkbox" class="lang-check" value="amharic"> <span class="text-xs font-medium">Amharic</span>
                            </label>
                            <label class="flex items-center gap-3 p-2 hover:bg-slate-800 rounded cursor-pointer border-l-2 border-transparent hover:border-emerald-500">
                                <input type="checkbox" class="lang-check" value="english"> <span class="text-xs font-medium">English</span>
                            </label>
                            <label class="flex items-center gap-3 p-2 hover:bg-slate-800 rounded cursor-pointer border-l-2 border-transparent hover:border-emerald-500">
                                <input type="checkbox" class="lang-check" value="arabic"> <span class="text-xs font-medium">Arabic</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950 rounded-lg p-6 border border-slate-900 font-mono text-xs text-slate-400 shadow-inner">
                <p class="text-slate-600 italic">Configure categories on left, search news or select languages on right, and initiate sequence...</p>
            </div>
        </div>
    </main>

    <script>
        function toggleAll(selector, isChecked) {
            document.querySelectorAll(selector).forEach(c => c.checked = isChecked);
        }

        function getHotNews() {
            const keyword = document.getElementById('hotNewsInput').value;
            if (!keyword) return alert("Please enter a keyword.");
            document.getElementById('outputContainer').innerHTML = `<div class="text-rose-500 animate-pulse font-mono">// Fetching breaking news for: ${keyword}...</div>`;
        }

        document.getElementById('runBtn').onclick = () => {
            const cats = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);
            const langs = Array.from(document.querySelectorAll('.lang-check:checked')).map(c => c.value);
            const output = document.getElementById('outputContainer');
            
            if (cats.length === 0 || langs.length === 0) {
                alert("Please select at least one Category and one Language.");
                return;
            }

            output.innerHTML = `<div class="text-emerald-500 animate-pulse font-mono tracking-widest uppercase text-[10px]">Initializing stream...</div>`;
            setTimeout(() => {
                output.innerHTML = `<pre class="text-emerald-400">// STREAM ACTIVE\n// Categories: ${cats.join(', ')}\n// Languages: ${langs.join(', ')}\n\n[Data stream initialized...]</pre>`;
            }, 800);
        };
    </script>
</body>
</html>

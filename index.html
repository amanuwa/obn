<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #02040a;
            margin: 0;
            min-height: 100vh;
        }
        .glow-border:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        input:focus, select:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans flex items-center justify-center p-6">

    <!-- SCREEN 1: SIGN-UP REGISTRATION -->
    <div id="signUpScreen" class="max-w-md w-full bg-slate-950 p-8 rounded-2xl shadow-2xl border border-slate-800 relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-sky-500 via-blue-500 to-indigo-500"></div>

        <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
            Initialize Agent Access
        </h2>
        <p class="text-xs text-sky-400 text-center uppercase tracking-widest font-mono mb-6">Create Journalist Security Profile</p>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                <div class="glow-border flex items-center bg-slate-900 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                    <span class="text-slate-500 mr-2.5 select-none">👤</span>
                    <input type="text" id="regName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalism Assigned Sector</label>
                <div class="glow-border flex items-center bg-slate-900 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                    <span class="text-slate-500 mr-2.5 select-none">🗂️</span>
                    <select id="regSection" required class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 cursor-pointer text-slate-300">
                        <option value="" disabled selected class="bg-slate-950 text-slate-500">Select Sector...</option>
                        <option value="World Politics and Governance" class="bg-slate-950 text-white">World Politics and Governance</option>
                        <option value="Sports & Analytics" class="bg-slate-950 text-white">Sports & Analytics</option>
                        <option value="Business and Finance" class="bg-slate-950 text-white">Business and Finance</option>
                        <option value="General Hot News" class="bg-slate-950 text-white">General Hot News</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Secure Access Password</label>
                <div class="glow-border flex items-center bg-slate-900 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                    <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                    <input type="password" id="regPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                </div>
            </div>

            <button onclick="registerJournalist()" id="signUpBtn" class="w-full bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-sky-600/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                Sign Up
            </button>
            
            <p id="successMessage" class="text-sm text-emerald-400 font-mono text-center mt-2 hidden">✓ Profile compiled! Routing to Portal Terminal...</p>

            <div class="text-center mt-4">
                <p class="text-xs text-slate-400">Already registered? <a href="#" onclick="showScreen('signInScreen')" class="text-sky-400 hover:underline font-mono">Secure Log In</a></p>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: SIGN-IN PORTAL -->
    <div id="signInScreen" class="hidden max-w-md w-full bg-slate-950 p-8 rounded-2xl shadow-2xl border border-slate-800 relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-sky-500 to-indigo-600"></div>

        <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
            Operator Portal
        </h2>
        <p class="text-xs text-sky-400 text-center uppercase tracking-widest font-mono mb-6">Authenticate Credentials</p>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                <div class="glow-border flex items-center bg-slate-900 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                    <span class="text-slate-500 mr-2.5 select-none">👤</span>
                    <input type="text" id="loginName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 font-mono">Access Password</label>
                </div>
                <div class="glow-border flex items-center bg-slate-900 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                    <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                    <input type="password" id="loginPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                </div>
            </div>

            <button onclick="loginJournalist()" id="signInBtn" class="w-full bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-sky-600/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                Sign In
            </button>

            <div class="text-center mt-4">
                <p class="text-xs text-slate-400">New Agent? <a href="#" onclick="showScreen('signUpScreen')" class="text-sky-400 hover:underline font-mono">Initialize Access Profile</a></p>
            </div>
        </div>
    </div>

    <!-- LOGIC CONFIGURATION -->
    <script>
        const SUPABASE_URL = 'https://cqkaxhyrnjmqpovxwjom.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxa2F4hHlybmptcXBvdnh3am9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTkwMTcsImV4cCI6MjA5ODY5NTAxN30.eT1lDRDoV3SK_d9yEAYzN6X-lC6EKkNNoavQxgLU6-Q';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showScreen(screenId) {
            const screens = ['signUpScreen', 'signInScreen'];
            screens.forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function registerJournalist() {
            const fullName = document.getElementById('regName').value.trim();
            const section = document.getElementById('regSection').value;
            const password = document.getElementById('regPassword').value;
            const signUpBtn = document.getElementById('signUpBtn');
            const successMsg = document.getElementById('successMessage');

            if (!fullName || !section || !password) return alert("All profile registration parameters are required.");

            signUpBtn.disabled = true;
            signUpBtn.innerText = "Processing Profile...";

            try {
                const { data: existingUsers, error: checkError } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', fullName);

                if (checkError) throw checkError;
                if (existingUsers && existingUsers.length > 0) {
                    alert(`Registration failed: The operator name "${fullName}" is already taken.`);
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    return; 
                }

                const { error: insertError } = await supabaseClient
                    .from('journalists')
                    .insert([{"Journalist name": fullName, "journalism Section": section, "Password": password}]);

                if (insertError) throw insertError;

                successMsg.classList.remove('hidden');
                setTimeout(() => {
                    successMsg.classList.add('hidden');
                    document.getElementById('loginName').value = fullName;
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    showScreen('signInScreen');
                }, 1500);

            } catch (error) {
                alert("Database Insertion Error: " + error.message);
                signUpBtn.disabled = false;
                signUpBtn.innerText = "Sign Up";
            }
        }

        async function loginJournalist() {
            const nameInput = document.getElementById('loginName').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;
            const signInBtn = document.getElementById('signInBtn');

            if (!nameInput || !passwordInput) return alert("Please enter both your name and password.");

            signInBtn.disabled = true;
            signInBtn.innerText = "Authenticating...";

            try {
                const { data: records, error } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', nameInput);

                if (error) throw error;
                if (!records || records.length === 0 || records[0].Password !== passwordInput) {
                    alert("Authentication Error: Invalid profile credentials.");
                    signInBtn.disabled = false;
                    signInBtn.innerText = "Sign In";
                    return;
                }

                alert(`Access Authenticated! Welcome Operator ${records[0]["Journalist name"]}.`);
                signInBtn.disabled = false;
                signInBtn.innerText = "Sign In";
                document.getElementById('loginPassword').value = ""; 

            } catch (error) {
                alert("Login Error: " + error.message);
                signInBtn.disabled = false;
                signInBtn.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>

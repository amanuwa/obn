<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #02071a; margin: 0; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans relative">

    <div id="canvas-container"></div>

    <div id="dashboardScreen" class="flex-1 flex flex-col relative z-10">
        <header class="bg-slate-950/60 backdrop-blur-md border-b border-slate-850 px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="portalIcon" class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center font-black text-xs">AI</div>
                <span id="portalTitle" class="font-bold tracking-tight text-slate-200">Sports Analytics Terminal</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="profileDisplay" class="text-xs text-sky-400 font-mono font-bold">---</span>
                <button id="logoutBtn" class="text-xs font-mono text-slate-400 hover:text-rose-400">Logout</button>
            </div>
        </header>

        <main class="max-w-7xl w-full mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 p-8 flex-1 items-start">
            <div class="bg-slate-950/50 backdrop-blur-xl p-6 rounded-2xl border border-slate-850 space-y-5">
                <select id="leagueSelector" class="w-full bg-slate-950 p-2 border border-slate-800 rounded text-sm text-white">
                    <option value="">Select League...</option>
                    <option value="ethiopian">Ethiopian Premier League</option>
                    <option value="international">International Soccer</option>
                    <option value="other">Other Sports</option>
                </select>
                <div id="gameSelectionContainer" class="text-xs space-y-2 p-3 bg-slate-900 rounded border border-slate-800 min-h-[120px]">
                    <p class="text-slate-500 italic">Select a league to view games...</p>
                </div>
                <button id="runBtn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg text-xs uppercase">Get Data</button>
            </div>
            <div class="md:col-span-2 bg-slate-950/50 backdrop-blur-xl p-6 rounded-2xl border border-slate-850 flex flex-col min-h-[480px]">
                <div id="loadingState" class="hidden my-auto text-center"><div class="animate-spin inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div><p class="text-emerald-400 font-mono text-xs">Streaming data...</p></div>
                <div id="outputState" class="flex-1 overflow-auto"><pre id="jsonDisplay" class="text-slate-300 text-xs"></pre></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { DESK_CONFIGS } from './deskConfigs.js';
        
        // --- DYNAMIC LIST LOGIC ---
        window.updateGameList = (mode) => {
            const container = document.getElementById("gameSelectionContainer");
            if (!mode) return container.innerHTML = '<p class="text-slate-500 italic">Select a league...</p>';
            
            const config = DESK_CONFIGS["sports & analytics"].leagues[mode];
            let html = `<div class="mb-2 border-b border-slate-800 pb-2"><input type="checkbox" id="selectAll" onclick="document.querySelectorAll('.game-check').forEach(c=>c.checked=this.checked)"> <label>Select All</label></div>`;
            
            config.games.forEach(game => {
                html += `<div class="flex items-center gap-2"><input type="checkbox" class="game-check" value="${game}"> <span>${game}</span></div>`;
            });
            container.innerHTML = html;
        };

        document.getElementById("leagueSelector").onchange = (e) => updateGameList(e.target.value);
        document.getElementById('runBtn').onclick = () => {
            const selected = Array.from(document.querySelectorAll('.game-check:checked')).map(c => c.value);
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('outputState').classList.add('hidden');
            
            setTimeout(() => {
                document.getElementById('jsonDisplay').textContent = JSON.stringify({ selectedGames: selected }, null, 2);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('outputState').classList.remove('hidden');
            }, 2000);
        };
    </script>
</body>
</html>

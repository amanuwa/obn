<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Analytics Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Three.js Library Dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column;
            background-color: #02040e; position: relative; overflow: hidden;
        }

        /* CYBER MATRIX CANVAS STAGE */
        .cyber-backdrop-container {
            position: absolute; inset: 0; z-index: 0;
            background: radial-gradient(circle at center, #071235 0%, #02040e 100%);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #globeCanvasContainer {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
        }

        /* HUD Grid */
        .hud-overlay {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 1;
            pointer-events: none;
        }

        /* Laser Sweep Line */
        .scanline {
            position: absolute; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #10b981, #00f2fe, #10b981, transparent);
            box-shadow: 0 0 20px #10b981; top: 0; z-index: 4;
            animation: scanning 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scanning {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* DASHBOARD STATE RULES */
        .cyber-backdrop-container.dashboard-active {
            opacity: 0.4;
        }
        .cyber-backdrop-container.dashboard-active .scanline {
            display: none;
        }

        /* PANELS LAYER TRANSITION SYSTEM */
        .app-interface {
            opacity: 0; transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.1, 1, 0.1, 1), transform 1.2s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .app-interface.visible {
            opacity: 1; transform: translateY(0);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #059669; border-radius: 4px; }
    </style>
</head>
<body class="font-sans text-sm">

    <!-- STEP 1: QUANTUM PARTICLE SYSTEM AND HUD LAYER -->
    <div id="backdropStage" class="cyber-backdrop-container">
        <div class="hud-overlay"></div>
        <div id="laserLine" class="scanline"></div>
        <!-- 3D Globe Pipeline Container -->
        <div id="globeCanvasContainer"></div>
        
        <!-- DYNAMIC LOOPING SPORT BIG TEXT DISPLAY -->
        <div id="quantumSportText" class="absolute inset-0 flex items-center justify-center pointer-events-none z-3 opacity-0 select-none will-change-transform transition-all ease-out duration-100">
            <h1 class="text-8xl md:text-[13rem] font-black tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 filter drop-shadow-[0_0_50px_rgba(6,182,212,0.6)] font-sans">
                SPORT
            </h1>
        </div>
    </div>

    <!-- STEP 2: METRICS TELEMETRY PANELS DISPLAY -->
    <div id="mainAppFrame" class="app-interface relative z-10 flex flex-col h-full w-full pointer-events-auto">
        
        <!-- HEADER -->
        <header class="bg-slate-950/60 border-b-2 border-slate-800 px-6 py-4 flex items-center justify-between backdrop-blur-lg">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-emerald-600 flex items-center justify-center font-bold text-xs border border-emerald-400">AI</div>
                <span class="font-semibold text-slate-100 tracking-tight text-base">Sports Analytics Terminal</span>
            </div>
            <div class="font-mono text-xs text-emerald-400 tracking-wider animate-pulse">// MULTI-SPORT STREAM INGESTION ACTIVE</div>
        </header>

        <!-- DASHBOARD BODY PANEL MATRIX -->
        <main class="flex-1 grid grid-cols-4 gap-4 p-4 h-full overflow-hidden">
            
            <!-- CONTROLS SIDE PANEL -->
            <div class="col-span-1 bg-slate-950/45 p-5 border-2 border-slate-800 flex flex-col h-full overflow-y-auto rounded-xl shadow-2xl backdrop-blur-lg">
                <h3 class="text-[11px] font-bold text-emerald-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Select Categories
                </h3>
                
                <div id="categoryContainer" class="space-y-2 mb-4">
                    <button onclick="toggleAll('.cat-check', true)" class="w-full bg-emerald-950/40 hover:bg-emerald-600 border border-emerald-500 text-emerald-400 hover:text-white py-2 px-3 rounded-lg font-medium text-xs uppercase transition-all cursor-pointer tracking-wider">
                        Select All Categories
                    </button>

                    <label class="flex items-center bg-slate-950/60 border border-slate-800 p-3 rounded-lg cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" id="epl-check" class="cat-check scale-110 accent-emerald-600" value="epl"> <span class="text-xs font-normal uppercase ml-3 text-slate-300">Ethiopian Premier League</span>
                    </label>
                    <label class="flex items-center bg-slate-950/60 border border-slate-800 p-3 rounded-lg cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-110 accent-emerald-600" value="international"> <span class="text-xs font-normal uppercase ml-3 text-slate-300">International</span>
                    </label>
                    <label class="flex items-center bg-slate-950/60 border border-slate-800 p-3 rounded-lg cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-110 accent-emerald-600" value="athletics"> <span class="text-xs font-normal uppercase ml-3 text-slate-300">Athletics</span>
                    </label>
                    <label class="flex items-center bg-slate-950/60 border border-slate-800 p-3 rounded-lg cursor-pointer transition-all hover:border-emerald-500">
                        <input type="checkbox" class="cat-check scale-110 accent-emerald-600" value="others"> <span class="text-xs font-normal uppercase ml-3 text-slate-300">Others</span>
                    </label>
                </div>

                <div class="flex-1 bg-slate-950/70 rounded-lg border border-slate-850 p-4 mb-4 overflow-y-auto">
                    <h3 class="text-[10px] font-medium text-slate-400 uppercase mb-2">Active Sources</h3>
                    <div id="activeSourceList" class="space-y-2 font-mono text-[11px] text-slate-500 italic">// Waiting for pipeline...</div>
                </div>

                <button id="runBtn" class="w-full bg-emerald-600 border border-emerald-400 py-3 rounded-lg font-semibold text-xs uppercase hover:bg-emerald-500 transition-all cursor-pointer shadow-md tracking-wider">Fire Pipeline</button>
            </div>

            <!-- TERMINAL MAIN DATA MONITOR -->
            <div class="col-span-3 bg-slate-950/40 p-5 border-2 border-slate-800 flex flex-col h-full overflow-y-auto rounded-xl shadow-2xl backdrop-blur-lg">
                <div class="mb-4">
                    <h3 class="font-semibold text-xs uppercase text-slate-400 tracking-wider mb-3">Scraped Intelligence Matrix</h3>
                    
                    <div class="bg-slate-950/50 border border-slate-800 p-4 rounded-xl w-full mb-4">
                        <h3 class="text-[10px] font-bold text-rose-500 uppercase mb-2 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-ping"></span> Fast Hot News
                        </h3>
                        <div class="flex gap-2">
                            <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950/80 border border-slate-800 rounded-lg p-2.5 text-xs text-white focus:border-rose-500 outline-none">
                            <button onclick="getHotNews()" class="bg-rose-600 border border-rose-400 px-5 py-2.5 rounded-lg font-bold text-xs uppercase hover:bg-rose-500 cursor-pointer transition-colors tracking-wider">Go</button>
                        </div>
                    </div>
                    
                    <div class="bg-slate-950/50 border border-slate-800 p-4 rounded-xl w-full flex justify-between items-center flex-wrap gap-3">
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="toggleAll('.lang-check', true)" class="bg-emerald-950 hover:bg-emerald-600 border border-emerald-500 text-emerald-400 hover:text-white px-4 py-2 rounded-lg font-semibold text-xs uppercase transition-all cursor-pointer tracking-wider">Select All</button>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950/80 py-2 px-3 border border-slate-800 rounded-lg hover:border-slate-600"><input type="checkbox" class="lang-check scale-110 accent-emerald-500" value="oromifa"> <span class="text-xs font-normal uppercase text-slate-400">Oromifa</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950/80 py-2 px-3 border border-slate-800 rounded-lg hover:border-slate-600"><input type="checkbox" class="lang-check scale-110 accent-emerald-500" value="amharic"> <span class="text-xs font-normal uppercase text-slate-300">Amharic</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950/80 py-2 px-3 border border-slate-800 rounded-lg hover:border-slate-600"><input type="checkbox" class="lang-check scale-110 accent-emerald-500" value="english"> <span class="text-xs font-normal uppercase text-slate-300">English</span></label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-950/80 py-2 px-3 border border-slate-800 rounded-lg hover:border-slate-600"><input type="checkbox" class="lang-check scale-110 accent-emerald-500" value="arabic"> <span class="text-xs font-normal uppercase text-slate-300">Arabic</span></label>
                        </div>
                        <button onclick="downloadData()" class="bg-blue-600 border border-blue-400 px-5 py-2 rounded-lg font-semibold text-xs uppercase shadow-md hover:bg-blue-500 transition-all cursor-pointer tracking-wider">Download</button>
                    </div>
                </div>

                <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950/80 rounded-lg p-4 border border-slate-900 font-mono text-xs text-emerald-400 shadow-inner">
                    <p class="text-slate-500 italic font-normal">// Matrix ready for sports intelligence ingestion...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- LIFECYCLE CONTROLLER SCRIPTS -->
    <script>
        // --- THREE.JS QUANTUM GLOBE ENGINE ---
        let scene, camera, renderer, globeParticles;
        const clock = new THREE.Clock();
        const baseRadius = 50;
        const totalParticles = 2800;
        let sportTextEl;

        function buildEnergyNodeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.2, '#00f2fe');
            gradient.addColorStop(0.5, '#10b981');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function initGlobeSystem() {
            const container = document.getElementById('globeCanvasContainer');
            sportTextEl = document.getElementById('quantumSportText');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalParticles * 3);
            const vectors = new Float32Array(totalParticles * 3);
            const burstSpeeds = new Float32Array(totalParticles);

            for(let i = 0; i < totalParticles; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                const x = Math.sin(phi) * Math.cos(theta);
                const y = Math.sin(phi) * Math.sin(theta);
                const z = Math.cos(phi);

                vectors[i * 3] = x;
                vectors[i * 3 + 1] = y;
                vectors[i * 3 + 2] = z;

                positions[i * 3] = x * baseRadius;
                positions[i * 3 + 1] = y * baseRadius;
                positions[i * 3 + 2] = z * baseRadius;

                burstSpeeds[i] = 0.4 + Math.random() * 1.6;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 2.2,
                transparent: true,
                opacity: 0.9,
                map: buildEnergyNodeTexture(),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            globeParticles = new THREE.Points(geometry, material);
            globeParticles.userData = { vectors, burstSpeeds, loopTimer: 0 };
            scene.add(globeParticles);

            animateGlobePipeline();
        }

        function animateGlobePipeline() {
            requestAnimationFrame(animateGlobePipeline);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            if (globeParticles) {
                const posAttr = globeParticles.geometry.attributes.position;
                const positions = posAttr.array;
                const vectors = globeParticles.userData.vectors;
                const speeds = globeParticles.userData.burstSpeeds;
                
                globeParticles.userData.loopTimer += delta;
                const timer = globeParticles.userData.loopTimer % 6;

                globeParticles.rotation.y += 0.008;
                globeParticles.rotation.x += 0.003;

                if (timer < 2.0) {
                    if(sportTextEl) {
                        sportTextEl.style.opacity = '0';
                        sportTextEl.style.transform = 'scale(0.85)';
                    }

                    for (let i = 0; i < totalParticles; i++) {
                        positions[i * 3] = vectors[i * 3] * baseRadius;
                        positions[i * 3 + 1] = vectors[i * 3 + 1] * baseRadius;
                        positions[i * 3 + 2] = vectors[i * 3 + 2] * baseRadius;
                    }
                } 
                else if (timer >= 2.0 && timer < 3.5) {
                    const progress = (timer - 2.0) / 1.5;
                    
                    if(sportTextEl) {
                        sportTextEl.style.opacity = progress;
                        sportTextEl.style.transform = `scale(${0.85 + (progress * 0.15)})`;
                    }

                    for (let i = 0; i < totalParticles; i++) {
                        const vx = vectors[i * 3];
                        const vy = vectors[i * 3 + 1];
                        const vz = vectors[i * 3 + 2];
                        const speed = speeds[i];

                        const expansionDist = baseRadius + (progress * 380 * speed);
                        
                        positions[i * 3] = vx * expansionDist + Math.sin(elapsed * speed * 3) * 5;
                        positions[i * 3 + 1] = vy * expansionDist + Math.cos(elapsed * speed * 3) * 5;
                        positions[i * 3 + 2] = vz * expansionDist;
                    }
                } 
                else {
                    const returnProgress = (timer - 3.5) / 2.5;
                    
                    if(sportTextEl) {
                        sportTextEl.style.opacity = 1 - returnProgress;
                    }

                    for (let i = 0; i < totalParticles; i++) {
                        const vx = vectors[i * 3];
                        const vy = vectors[i * 3 + 1];
                        const vz = vectors[i * 3 + 2];

                        const currentX = positions[i * 3];
                        const currentY = positions[i * 3 + 1];
                        const currentZ = positions[i * 3 + 2];

                        const targetX = vx * baseRadius;
                        const targetY = vy * baseRadius;
                        const targetZ = vz * baseRadius;

                        positions[i * 3] = THREE.MathUtils.lerp(currentX, targetX, returnProgress);
                        positions[i * 3 + 1] = THREE.MathUtils.lerp(currentY, targetY, returnProgress);
                        positions[i * 3 + 2] = THREE.MathUtils.lerp(currentZ, targetZ, returnProgress);
                    }
                }
                posAttr.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- CORE LIFECYCLE CONTROLLERS ---
        window.addEventListener('DOMContentLoaded', () => {
            initGlobeSystem();
            
            const stage = document.getElementById('backdropStage');
            const appFrame = document.getElementById('mainAppFrame');

            setTimeout(() => {
                stage.classList.add('dashboard-active');
                appFrame.classList.add('visible');
            }, 3500);
        });

        function toggleAll(selector, isChecked) { document.querySelectorAll(selector).forEach(c => c.checked = isChecked); }
        
        // --- DIRECT BESOCCER SCRAPER (NO N8N REQUIRED FOR EPL) ---
        async function fetchEPLFixturesDirect() {
            const output = document.getElementById('outputContainer');
            output.innerHTML = `<div class="text-emerald-400 font-mono animate-pulse">// INGESTING ETHIOPIAN PREMIER LEAGUE FIXTURES DIRECTLY FROM BESOCCER...</div>`;

            const targetUrl = 'https://www.besoccer.com/competition/premier_league_ethiopia';
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("CORS Proxy unreachable");
                
                const data = await response.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');

                const matchElements = doc.querySelectorAll('a[href*="/match/"]');
                const extractedFixtures = [];
                const seenUrls = new Set();

                matchElements.forEach(el => {
                    const href = el.getAttribute('href');
                    const text = el.innerText.trim().replace(/\s+/g, ' ');

                    if (href && text.length > 3 && !seenUrls.has(href)) {
                        seenUrls.add(href);
                        const fullUrl = href.startsWith('http') ? href : `https://www.besoccer.com${href}`;
                        
                        extractedFixtures.push({
                            news: text,
                            url: fullUrl,
                            detailedText: "Ethiopian Premier League Fixture / Live Match Node",
                            date: "Current Season / Round"
                        });
                    }
                });

                if (extractedFixtures.length === 0) {
                    extractedFixtures.push({
                        news: "Ethiopian Premier League - Competition Hub",
                        url: targetUrl,
                        detailedText: "Click to open full Ethiopian Premier League standings, fixtures, and scores.",
                        date: "Live Direct Stream"
                    });
                }

                renderFixtures(extractedFixtures);

            } catch (err) {
                console.error("Direct fetch error:", err);
                output.innerHTML = `
                    <div class="text-rose-500 font-mono mb-3">// DIRECT SCRAPE ENCOUNTERED CORS CONSTRAINT. ACCESS HUB DIRECTLY:</div>
                    <a href="${targetUrl}" target="_blank" class="p-3 bg-slate-900 border border-emerald-500 rounded block text-emerald-400 font-bold hover:underline">
                        ↗ Open BeSoccer Ethiopian Premier League Terminal
                    </a>
                `;
            }
        }

        // --- FIRE PIPELINE HANDLER ---
        document.getElementById('runBtn').onclick = async () => {
            const runBtn = document.getElementById('runBtn');
            const eplChecked = document.getElementById('epl-check').checked;
            const mainCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);
            const sourceList = document.getElementById('activeSourceList');
            const output = document.getElementById('outputContainer');

            if (mainCats.length === 0) return alert("Select at least one active intelligence sector category.");

            sourceList.innerHTML = mainCats.map(item => 
                `<div class="p-2 bg-slate-900 rounded border border-emerald-500 text-emerald-300 font-mono text-xs">» ${item.toUpperCase()}</div>`
            ).join('');

            // IF EPL IS CHECKED, SCRAPE DIRECTLY WITHOUT N8N
            if (eplChecked) {
                await fetchEPLFixturesDirect();
                return;
            }

            // FOR OTHER CATEGORIES, ROUTE TO N8N WORKFLOW
            output.innerHTML = `<div class="text-emerald-400 font-mono animate-pulse">// CONNECTING TO AI INGESTION WORKFLOW...</div>`;
            runBtn.disabled = true;

            const payload = {
                page: "sports",
                targetMatrix: "sports_analytics",
                categories: mainCats,
                websites: ["https://www.bbc.com/sport"],
                query: "Latest global sports headlines",
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch('https://unreached-oboe-evade.ngrok-free.dev/webhook-test/staritofhormuz', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP Status: ${response.status}`);

                const data = await response.json();
                renderFixtures(data);

            } catch (err) {
                output.innerHTML = `<div class="text-rose-500 font-mono">// WORKFLOW EXECUTION FAILED: ${err.message}</div>`;
            } finally {
                runBtn.disabled = false;
            }
        };

        async function getHotNews() {
            const queryVal = document.getElementById('hotNewsInput').value.trim();
            const output = document.getElementById('outputContainer');
            if (!queryVal) return alert("Please enter a sports topic.");

            output.innerHTML = `<div class="text-rose-500 font-mono animate-pulse">// FAST HOT NEWS: QUERYING INGESTION FEED FOR [${queryVal.toUpperCase()}]...</div>`;

            const payload = {
                page: "sports",
                targetMatrix: "hot_news",
                query: queryVal,
                websites: ["https://www.bbc.com/sport"],
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch('https://unreached-oboe-evade.ngrok-free.dev/webhook-test/staritofhormuz', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                renderFixtures(data);
            } catch (err) {
                output.innerHTML = `<div class="text-rose-500 font-mono">// FAST HOT NEWS FAILED: ${err.message}</div>`;
            }
        }

        function renderFixtures(dataList) {
            const output = document.getElementById('outputContainer');
            output.innerHTML = '';

            if (!Array.isArray(dataList) || dataList.length === 0) {
                output.innerHTML = `<div class="text-slate-400 font-mono">// NO RECENT DATA NODES RETURNED</div>`;
                return;
            }

            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid grid-cols-1 md:grid-cols-2 gap-3 font-sans';

            dataList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'p-3 bg-slate-900/90 border border-emerald-500/40 hover:border-emerald-400 rounded-lg shadow transition-all flex flex-col justify-between';
                
                card.innerHTML = `
                    <div>
                        <a href="${item.url || '#'}" target="_blank" class="text-emerald-400 font-bold hover:underline text-xs flex items-center justify-between gap-2">
                            <span>${item.news || 'Match Fixture'}</span>
                            <span class="text-[10px] bg-emerald-950 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded flex-shrink-0">↗ MATCH</span>
                        </a>
                        <p class="text-slate-300 text-[11px] mt-2 line-clamp-2">${item.detailedText || ''}</p>
                    </div>
                    <div class="mt-3 flex items-center justify-between border-t border-slate-800 pt-2 text-[10px] text-slate-400 font-mono">
                        <span>📅 ${item.date || 'Recent'}</span>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            output.appendChild(gridContainer);
        }

        function downloadData() {
            const data = document.getElementById('outputContainer').innerText;
            const blob = new Blob([data], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sports-scrapped-intel.txt'; a.click();
        }
    </script>
</body>
</html>

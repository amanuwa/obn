<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #02071a; margin: 0; overflow: hidden; height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .ui-container { position: relative; z-index: 10; height: 100%; display: flex; align-items: center; justify-content: center; }
        .glow-border:focus-within { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body class="text-slate-100 font-sans">

    <!-- 3D BACKGROUND -->
    <div id="canvas-container"></div>

    <!-- UI LAYER -->
    <div class="ui-container">
        <!-- SIGN-UP MODULE -->
        <div id="signUpScreen" class="w-full max-w-md bg-slate-950/50 backdrop-blur-xl p-8 rounded-2xl border border-sky-500/20">
            <h2 class="text-2xl font-black text-center text-white mb-1">Initialize Agent Access</h2>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <select id="regSection" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                    <option value="Sports & Analytics">Sports & Analytics</option>
                </select>
                <input type="password" id="regPassword" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <button id="signUpBtn" class="w-full bg-sky-600 py-3 rounded-lg font-bold uppercase text-xs">Sign Up</button>
            </div>
        </div>
    </div>

    <script type="module">
        // 3D GLOBE INITIALIZATION
        let scene, camera, renderer, globeGroup, pointCloud;
        function initCyberGlobe() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(2000 * 3);
            for(let i = 0; i < 2000 * 3; i++) positions[i] = (Math.random() - 0.5) * 200;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            pointCloud = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x38bdf8, size: 0.8, transparent: true, opacity: 0.6 }));
            globeGroup = new THREE.Group();
            globeGroup.add(pointCloud);
            scene.add(globeGroup);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initCyberGlobe();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #02040a;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* REVOLVING CYBER GLOBE BACKGROUND */
        .rotating-globe {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 140vmax;
            height: 140vmax;
            /* Added radial gradient fallback to ensure the "glowing" effect is always visible */
            background: radial-gradient(circle, #075985 0%, #02040a 70%);
            background-image: url('Screenshot 2026-07-08 004611.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
            animation: spin 120s linear infinite;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* UI Contrast Veil */
        .overlay-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(2, 4, 10, 0) 0%, rgba(2, 4, 10, 0.85) 100%), rgba(2, 4, 10, 0.4);
            z-index: 2;
            pointer-events: none;
        }

        .ui-container {
            position: relative;
            z-index: 3;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .glow-border:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="text-slate-100 font-sans p-6">

    <div class="rotating-globe"></div>
    <div class="overlay-veil"></div>

    <div class="ui-container w-full max-w-md">
        <div id="statusBuffer" class="hidden text-xs p-3.5 rounded-xl border mb-4 bg-slate-950/90 backdrop-blur-xl font-mono"></div>

        <!-- SIGN UP PANEL -->
        <div id="signUpScreen" class="w-full bg-slate-950/85 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-slate-800">
            <h2 class="text-2xl font-black text-center text-white mb-1">Initialize Agent Access</h2>
            <p class="text-xs text-sky-400 text-center uppercase tracking-widest font-mono mb-6">Create Journalist Security Profile</p>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <select id="regSection" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                    <option value="sports & analytics">Sports & Analytics</option>
                </select>
                <input type="password" id="regPassword" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <button id="signUpBtn" class="w-full bg-sky-600 py-3 rounded-lg font-bold uppercase text-xs">Sign Up</button>
            </div>
        </div>

        <!-- SIGN IN PANEL -->
        <div id="signInScreen" class="hidden w-full bg-slate-950/85 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-slate-800">
            <h2 class="text-2xl font-black text-center text-white mb-1">Operator Portal</h2>
            <div class="space-y-4">
                <input type="text" id="loginName" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm">
                <button id="signInBtn" class="w-full bg-sky-600 py-3 rounded-lg font-bold uppercase text-xs">Sign In</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Your existing script logic remains unchanged.
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- THREE.JS CORE ENGINE DEPENDENCY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            background-color: #010206;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* 3D CANVAS LAYER POSITIONING */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* 2060 Quantum Contrast Veil */
        .overlay-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(1, 2, 6, 0) 0%, rgba(1, 2, 6, 0.4) 70%, rgba(1, 2, 6, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .ui-container {
            position: relative;
            z-index: 2;
        }

        .glow-border:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }
        
        input:focus, select:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans flex items-center justify-center p-6">

    <!-- 3D BACKGROUND STRUCTURES -->
    <div id="canvas-container"></div>
    <div class="overlay-veil"></div>

    <div class="ui-container w-full max-w-md">

        <!-- SYSTEM STATUS NOTICE BUFFER -->
        <div id="statusBuffer" class="hidden text-xs p-3.5 rounded-xl border mb-4 bg-slate-950/90 backdrop-blur-xl font-mono transition-all duration-300"></div>

        <!-- SIGN UP PANEL -->
        <div id="signUpScreen" class="w-full bg-slate-950/80 backdrop-blur-2xl p-8 rounded-2xl shadow-2xl border border-slate-800/80 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-cyan-400 via-sky-500 to-indigo-500"></div>

            <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
                Initialize Agent Access
            </h2>
            <p class="text-xs text-cyan-400 text-center uppercase tracking-widest font-mono mb-6">Create Journalist Security Profile</p>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                    <div class="glow-border flex items-center bg-slate-900/90 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">👤</span>
                        <input type="text" id="regName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalism Assigned Sector</label>
                    <div class="glow-border flex items-center bg-slate-900/90 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🗂️</span>
                        <select id="regSection" required class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 cursor-pointer text-slate-300">
                            <option value="" disabled selected class="bg-slate-950 text-slate-500">Select Sector...</option>
                            <option value="world politics and governance" class="bg-slate-950 text-white">World Politics and Governance</option>
                            <option value="sports & analytics" class="bg-slate-950 text-white">Sports & Analytics</option>
                            <option value="business and finance" class="bg-slate-950 text-white">Business and Finance</option>
                            <option value="general hot news" class="bg-slate-950 text-white">General Hot News</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Secure Access Password</label>
                    <div class="glow-border flex items-center bg-slate-900/90 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                        <input type="password" id="regPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                    </div>
                </div>

                <button id="signUpBtn" class="w-full bg-gradient-to-r from-cyan-600 via-sky-600 to-blue-700 hover:from-cyan-500 hover:via-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-cyan-500/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                    Sign Up
                </button>

                <div class="text-center mt-4">
                    <p class="text-xs text-slate-400">Already registered? <button id="toSignInBtn" class="text-cyan-400 hover:underline font-mono bg-transparent border-0 cursor-pointer p-0">Secure Log In</button></p>
                </div>
            </div>
        </div>

        <!-- SIGN IN PANEL -->
        <div id="signInScreen" class="hidden w-full bg-slate-950/80 backdrop-blur-2xl p-8 rounded-2xl shadow-2xl border border-slate-800/80 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-cyan-400 to-indigo-600"></div>

            <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
                Operator Portal
            </h2>
            <p class="text-xs text-cyan-400 text-center uppercase tracking-widest font-mono mb-6">Authenticate Credentials</p>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                    <div class="glow-border flex items-center bg-slate-900/90 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">👤</span>
                        <input type="text" id="loginName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Access Password</label>
                    <div class="glow-border flex items-center bg-slate-900/90 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                        <input type="password" id="loginPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                    </div>
                </div>

                <button id="signInBtn" class="w-full bg-gradient-to-r from-cyan-600 via-sky-600 to-blue-700 hover:from-cyan-500 hover:via-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-cyan-500/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                    Sign In
                </button>

                <div class="text-center mt-4">
                    <button id="toSignUpBtn" class="text-xs text-cyan-400 hover:underline font-mono bg-transparent border-0 cursor-pointer p-0">Initialize Access Profile</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPT INFRASTRUCTURE MODULE -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
        import { DESK_CONFIGS } from './deskConfigs.js';

        // --- 2060 QUANTUM COMPUTER GLOBE SYSTEM ---
        let scene, camera, renderer, masterGroup, coreMesh, matrixShell, matrixNodes, dataStreams, perimeterRings = [];
        let clock = new THREE.Clock();
        
        // Storage lists to remember original positions for precise reassembly scattering
        let originalStreamPositions = [];
        let scatterDirections = [];

        // High-Intensity Dynamic Canvas Glow Sprite Generator
        function createQuantumGlowNode(coreColor, edgeColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.15, coreColor);
            gradient.addColorStop(0.4, edgeColor);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function initQuantumGlobe() {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 1000);
            
            // ADJUSTMENT: Brought camera closer (from 160 to 90) to make the globe comfortably fit and fill the entire screen background
            camera.position.z = 90; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            masterGroup = new THREE.Group();

            const radius = 52;
            const segments = 32;

            // 1. Core Energy Biosphere (Inner Soft Light Reservoir)
            const coreGeo = new THREE.SphereGeometry(radius - 2, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0x032b59,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending,
                wireframe: false
            });
            coreMesh = new THREE.Mesh(coreGeo, coreMat);
            masterGroup.add(coreMesh);

            // 2. High-Tech Structural Grid Matrix
            const gridGeo = new THREE.SphereGeometry(radius, segments, segments);
            const gridMat = new THREE.MeshBasicMaterial({
                color: 0x06b6d4, // Neon Cyan
                wireframe: true,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending
            });
            matrixShell = new THREE.Mesh(gridGeo, gridMat);
            masterGroup.add(matrixShell);

            // 3. Anchor Points / Main Latitudinal Junction Nodes
            const nodeMat = new THREE.PointsMaterial({
                size: 2.8,
                transparent: true,
                opacity: 0.95,
                map: createQuantumGlowNode('#22d3ee', '#093370'),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            matrixNodes = new THREE.Points(gridGeo, nodeMat);
            masterGroup.add(matrixNodes);

            // 4. Kinetic Data Flow Particles (Dynamic Ring Orbit Clusters)
            const particleCount = 1500;
            const streamGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const randomSpeeds = new Float32Array(particleCount);
            
            for (let i = 0; i < particleCount; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                
                const shellRadius = radius + (Math.random() - 0.5) * 8;
                
                const posX = shellRadius * Math.sin(phi) * Math.cos(theta);
                const posY = shellRadius * Math.sin(phi) * Math.sin(theta);
                const posZ = shellRadius * Math.cos(phi);

                positions[i * 3] = posX;
                positions[i * 3 + 1] = posY;
                positions[i * 3 + 2] = posZ;
                
                randomSpeeds[i] = 0.2 + Math.random() * 0.8;

                // Cache original particle coordinates and directional vectors for scattering calculations
                originalStreamPositions.push(new THREE.Vector3(posX, posY, posZ));
                
                // Scatter outward vector combined with noise
                const dir = new THREE.Vector3(posX, posY, posZ).normalize();
                dir.x += (Math.random() - 0.5) * 0.5;
                dir.y += (Math.random() - 0.5) * 0.5;
                dir.z += (Math.random() - 0.5) * 0.5;
                scatterDirections.push(dir.normalize());
            }

            streamGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const streamMat = new THREE.PointsMaterial({
                size: 1.6,
                transparent: true,
                opacity: 0.85,
                map: createQuantumGlowNode('#ffffff', '#3b82f6'),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            dataStreams = new THREE.Points(streamGeometry, streamMat);
            dataStreams.userData = { speeds: randomSpeeds };
            masterGroup.add(dataStreams);

            // 5. Outer Atmospheric Quantum Containment Rings
            for (let i = 0; i < 4; i++) {
                const ringGeo = new THREE.RingGeometry(radius + 6 + (i * 4), radius + 6.8 + (i * 4), 64);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: i % 2 === 0 ? 0x22d3ee : 0x6366f1,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.12 - (i * 0.02),
                    blending: THREE.AdditiveBlending
                });
                const perimeterRing = new THREE.Mesh(ringGeo, ringMat);
                perimeterRing.rotation.x = Math.random() * Math.PI;
                perimeterRing.rotation.y = Math.random() * Math.PI;
                
                // Keep references to animate or fade rings during cycles
                perimeterRings.push(perimeterRing);
                masterGroup.add(perimeterRing);
            }

            scene.add(masterGroup);
            animateQuantumEngine();
        }

        function animateQuantumEngine() {
            requestAnimationFrame(animateQuantumEngine);
            const elapsedTime = clock.getElapsedTime();

            // Timeline phase controller loop:
            // 0s to 2s: Rotate normally (Phase 1)
            // 2s to 4s: Scatter/Explode outwards (Phase 2)
            // 4s to 6s: Reassemble/Collapse back together (Phase 3)
            const cycleDuration = 6; 
            const currentCycleTime = elapsedTime % cycleDuration;

            let scatterProgress = 0; // 0 = fully assembled globe, 1 = maximum scatter

            if (currentCycleTime >= 0 && currentCycleTime < 2) {
                // Phase 1: Pure rotation
                scatterProgress = 0;
            } else if (currentCycleTime >= 2 && currentCycleTime < 4) {
                // Phase 2: Exploding/Scattering (2 seconds transition)
                const t = (currentCycleTime - 2) / 2;
                // Cubic ease-out transformation for dramatic snap speed
                scatterProgress = 1 - Math.pow(1 - t, 3);
            } else if (currentCycleTime >= 4 && currentCycleTime < 6) {
                // Phase 3: Returning / Reassembling back smoothly (2 seconds transition)
                const t = (currentCycleTime - 4) / 2;
                // Smooth ease-in-out curve
                scatterProgress = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                scatterProgress = 1 - scatterProgress; // Reversing progress direction back to 0
            }

            if (masterGroup) {
                // Keep base rotation spinning continuously over time
                masterGroup.rotation.y = elapsedTime * 0.15;
                masterGroup.rotation.x = elapsedTime * 0.06;
            }

            // Animate structural mesh entities alongside scatter timeline thresholds
            const expansionFactor = 1.0 + scatterProgress * 2.5; 
            
            if (matrixShell) {
                matrixShell.scale.set(expansionFactor, expansionFactor, expansionFactor);
                matrixShell.material.opacity = 0.18 * (1.0 - scatterProgress); // fade out structure
            }
            if (matrixNodes) {
                matrixNodes.scale.set(expansionFactor, expansionFactor, expansionFactor);
                matrixNodes.material.opacity = 0.95 * (1.0 - scatterProgress * 0.7);
            }
            if (coreMesh) {
                // Local pulse layer logic
                const pulseScale = (1.0 + Math.sin(elapsedTime * 2.5) * 0.06) * (1.0 + scatterProgress * 4.0);
                coreMesh.scale.set(pulseScale, pulseScale, pulseScale);
                coreMesh.material.opacity = 0.25 * (1.0 - scatterProgress);
            }

            // Fade rings when scattering occurs
            perimeterRings.forEach((ring, index) => {
                ring.material.opacity = (0.12 - (index * 0.02)) * (1.0 - scatterProgress);
            });

            // Animate dynamic data streams (1500 individual elements) out into space
            if (dataStreams) {
                const positions = dataStreams.geometry.attributes.position.array;
                const speeds = dataStreams.userData.speeds;
                
                for (let i = 0; i < speeds.length; i++) {
                    const origPos = originalStreamPositions[i];
                    const dir = scatterDirections[i];
                    
                    // Base coordinates depending on current cycle state
                    // Explode outwards up to 220 units wide across camera projection plane
                    const scatterDistance = scatterProgress * (120 + speeds[i] * 100);
                    
                    let targetX = origPos.x + dir.x * scatterDistance;
                    let targetY = origPos.y + dir.y * scatterDistance;
                    let targetZ = origPos.z + dir.z * scatterDistance;

                    // Apply continuous micro-swirl patterns to floating dots 
                    targetY += Math.sin(elapsedTime * speeds[i]) * 0.4;
                    targetX += Math.cos(elapsedTime * speeds[i]) * 0.4;

                    positions[i * 3] = targetX;
                    positions[i * 3 + 1] = targetY;
                    positions[i * 3 + 2] = targetZ;
                }
                dataStreams.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Fire Quantum Terminal Engine System
        initQuantumGlobe();

        // --- AUTHENTICATION INTERACTION INFRASTRUCTURE ---
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true },
            global: {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        });

        const statusBuffer = document.getElementById('statusBuffer');

        function displayTerminalNotice(message, statusType = 'info') {
            statusBuffer.classList.remove('hidden', 'text-cyan-400', 'border-cyan-950/60', 'text-red-400', 'border-red-950/60', 'text-emerald-400', 'border-emerald-950/60');
            
            if (statusType === 'error') {
                statusBuffer.classList.add('text-red-400', 'border-red-950/60');
            } else if (statusType === 'success') {
                statusBuffer.classList.add('text-emerald-400', 'border-emerald-950/60');
            } else {
                statusBuffer.classList.add('text-cyan-400', 'border-cyan-950/60');
            }
            statusBuffer.innerText = `// ${message.toUpperCase()}`;
        }

        function showScreen(screenId) {
            statusBuffer.classList.add('hidden');
            document.getElementById('signUpScreen').classList.add('hidden');
            document.getElementById('signInScreen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        document.getElementById('toSignInBtn').addEventListener('click', () => showScreen('signInScreen'));
        document.getElementById('toSignUpBtn').addEventListener('click', () => showScreen('signUpScreen'));
        document.getElementById('signUpBtn').addEventListener('click', registerJournalist);
        document.getElementById('signInBtn').addEventListener('click', loginJournalist);

        async function registerJournalist() {
            const fullName = document.getElementById('regName').value.trim();
            const section = document.getElementById('regSection').value;
            const password = document.getElementById('regPassword').value;
            const signUpBtn = document.getElementById('signUpBtn');

            if (!fullName || !section || !password) {
                displayTerminalNotice("Registration Error: All parameters required.", "error");
                return;
            }

            signUpBtn.disabled = true;
            signUpBtn.innerText = "Processing Profile...";

            try {
                const { data: existingUsers, error: checkError } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', fullName);

                if (checkError) throw checkError;
                if (existingUsers && existingUsers.length > 0) {
                    displayTerminalNotice(`Registration failure: Name "${fullName}" is taken.`, "error");
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    return; 
                }

                const { error: insertError } = await supabaseClient
                    .from('journalists')
                    .insert([{"Journalist name": fullName, "journalism Section": section, "Password": password}]);

                if (insertError) throw insertError;

                displayTerminalNotice("Profile Compiled! Switching to authentication panel...", "success");
                setTimeout(() => {
                    statusBuffer.classList.add('hidden');
                    document.getElementById('loginName').value = fullName;
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    showScreen('signInScreen');
                }, 1500);

            } catch (error) {
                displayTerminalNotice("Database Core Error: " + error.message, "error");
                signUpBtn.disabled = false;
                signUpBtn.innerText = "Sign Up";
            }
        }

        async function loginJournalist() {
            const nameInput = document.getElementById('loginName').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;
            const signInBtn = document.getElementById('signInBtn');

            if (!nameInput || !passwordInput) {
                displayTerminalNotice("Authentication Error: Credentials missing.", "error");
                return;
            }

            signInBtn.disabled = true;
            signInBtn.innerText = "Authenticating...";

            try {
                const { data: records, error } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', nameInput);

                if (error) throw error;
                if (!records || records.length === 0 || records[0].Password !== passwordInput) {
                    displayTerminalNotice("Authentication Error: Invalid identity passkey.", "error");
                    signInBtn.disabled = false;
                    signInBtn.innerText = "Sign In";
                    return;
                }

                const assignedSection = records[0]["journalism Section"];
                const configMatch = DESK_CONFIGS[assignedSection];

                if (configMatch) {
                    displayTerminalNotice(`Access Granted! Routing to: ${configMatch.title}`, "success");
                } else {
                    displayTerminalNotice("Access Granted! Establishing session tunnel...", "success");
                }

                document.getElementById('loginPassword').value = ""; 

                setTimeout(() => {
                    signInBtn.disabled = false;
                    signInBtn.innerText = "Sign In";
                    window.location.href = 'customepage.html';
                }, 1200);

            } catch (error) {
                displayTerminalNotice("Security Subsystem Error: " + error.message, "error");
                signInBtn.disabled = false;
                signInBtn.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #02071a; margin: 0; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="bg-slate-950/60 backdrop-blur-md border-b border-slate-850 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center font-black text-xs">AI</div>
            <span class="font-bold text-slate-200">Sports Analytics Terminal</span>
        </div>
        <button class="text-xs font-mono text-slate-400 hover:text-rose-400">Logout</button>
    </header>

    <!-- MAIN LAYOUT: grid-cols-4 (1/4 for selection, 3/4 for data) -->
    <main class="max-w-[95%] w-full mx-auto grid grid-cols-4 gap-6 p-8 flex-1">
        
        <!-- LEFT: SELECTION PANEL -->
        <div class="col-span-1 bg-slate-950/50 p-6 rounded-2xl border border-slate-800 h-[600px] flex flex-col">
            <select id="leagueSelector" class="w-full bg-slate-950 p-3 border border-slate-800 rounded mb-4 text-sm text-white">
                <option value="">Select Category...</option>
                <option value="soccer">Ethiopian premier league</option>
                <option value="athletics">international </option>
                
                <option value="other">Atheletics </option>
                  <option value="athletics">others </option>
            </select>
            
            <div id="gameSelectionContainer" class="flex-1 overflow-y-auto space-y-2 pr-2">
                <p class="text-slate-500 italic text-xs">Select a category to view options...</p>
            </div>
            
            <button id="runBtn" class="w-full mt-4 bg-emerald-600 p-3 rounded font-bold text-xs uppercase">Get Data</button>
        </div>

        <!-- RIGHT: LARGE SCROLLABLE DISPLAY -->
        <div class="col-span-3 bg-slate-950/50 p-6 rounded-2xl border border-slate-800 flex flex-col h-[600px]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-sm">Scrapped Intelligence</h3>
                <select id="langSelector" class="bg-slate-900 border border-slate-700 p-2 text-xs rounded text-white">
                    <option>Oromifa</option>
                    <option>Amharic</option>
                    <option>English</option>
                    <option>Arabic</option>
                </select>
            </div>
            <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950 rounded-lg p-4 border border-slate-900 font-mono text-xs text-slate-300">
                <p class="text-slate-600">Awaiting data stream...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { DESK_CONFIGS } from './deskConfigs.js';

        window.updateGameList = (mode) => {
            const container = document.getElementById("gameSelectionContainer");
            if (!mode) return container.innerHTML = '<p class="text-slate-500 italic text-xs">Select a category...</p>';
            
            const config = DESK_CONFIGS["sports & analytics"].leagues[mode];
            let html = `<div class="mb-2 border-b border-slate-800 pb-2"><input type="checkbox" onclick="document.querySelectorAll('.game-check').forEach(c=>c.checked=this.checked)"> <span class="text-xs">Select All</span></div>`;
            
            config.items.forEach(item => {
                html += `<div class="flex items-center gap-2"><input type="checkbox" class="game-check" value="${item}"> <span class="text-sm">${item}</span></div>`;
            });
            container.innerHTML = html;
        };

        document.getElementById("leagueSelector").onchange = (e) => updateGameList(e.target.value);
        
        document.getElementById('runBtn').onclick = () => {
            const output = document.getElementById('outputContainer');
            output.innerHTML = '<div class="text-emerald-500">Fetching data...</div>';
            setTimeout(() => {
                output.innerHTML = `<pre class="text-emerald-400">// Data successfully retrieved in ${document.getElementById('langSelector').value}\n\n[Content will stream here...]</pre>`;
            }, 1000);
        };
    </script>
</body>
</html>

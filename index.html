<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance  | Business Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; background-color: #02071a; }
    </style>
</head>
<body>
    <script type="module">
        // 1. Import from ESM (this replaces the need for the <script> tag in head)
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

        // 2. Initialize using a clean variable name
        const sbClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadSourcesFromDB() {
            try {
                // Fetch Ethiopian Data
                const { data: ethData } = await sbClient
                    .from('Ethiopian -Business and finance websites')
                    .select('"Website -source", websites');
                
                // Fetch International Data
                const { data: intData } = await sbClient
                    .from('business and finance -websites')
                    .select('"website Source", websites');

                const ethContainer = document.getElementById('ethSources');
                const intContainer = document.getElementById('intSources');

                if (ethData) {
                    ethContainer.innerHTML = ''; 
                    ethData.forEach(item => {
                        ethContainer.innerHTML += `<label class="block text-[10px] py-1"><input type="checkbox" class="eth-src" value="${item.websites}"> ${item['Website -source']}</label>`;
                    });
                }

                if (intData) {
                    intContainer.innerHTML = '';
                    intData.forEach(item => {
                        intContainer.innerHTML += `<label class="block text-[10px] py-1"><input type="checkbox" class="int-src" value="${item.websites}"> ${item['website Source']}</label>`;
                    });
                }
            } catch (err) {
                console.error("Fetch failed:", err);
            }
        }

        loadSourcesFromDB();

        // UI Toggles
        document.getElementById('ethToggle').addEventListener('change', (e) => document.getElementById('ethSources').classList.toggle('hidden', !e.target.checked));
        document.getElementById('intToggle').addEventListener('change', (e) => document.getElementById('intSources').classList.toggle('hidden', !e.target.checked));
    </script>
</body>
</html>

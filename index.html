<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Analytics Telemetry Monitor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#10b981',
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased p-4 sm:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <span class="inline-block w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
                    Sports Analytics Telemetry
                </h1>
                <p class="text-slate-400 text-xs sm:text-sm mt-1">Real-time webhook trigger & stream data ingestion dashboard</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="downloadData()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-mono font-medium rounded-lg border border-slate-700 transition flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Export JSON
                </button>
            </div>
        </header>

        <!-- Controls Section -->
        <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-4 sm:p-6 shadow-xl backdrop-blur-sm">
            <h2 class="text-xs font-mono font-semibold uppercase tracking-wider text-slate-400 mb-4">// TELEMETRY CONTROLS</h2>
            
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-1">
                    <input type="text" id="webhookUrl" 
                        placeholder="https://your-n8n-instance.com/webhook/sports-scraper" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-200 font-mono focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition placeholder:text-slate-600" />
                </div>
                <button onclick="executeScraperWorkflow()" id="triggerBtn" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm rounded-lg shadow-lg shadow-emerald-950/50 transition duration-150 flex items-center justify-center gap-2 shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Run Workflow
                </button>
            </div>
        </section>

        <!-- Output / Stream Monitor -->
        <main class="bg-slate-900/60 border border-slate-800 rounded-xl p-4 sm:p-6 shadow-xl">
            <div id="outputContainer" class="min-h-[280px]">
                <div class="flex flex-col items-center justify-center h-64 text-center text-slate-500 font-mono">
                    <svg class="w-10 h-10 mb-3 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <p class="text-sm">Awaiting workflow execution...</p>
                    <p class="text-xs text-slate-600 mt-1">Enter a webhook URL above and trigger the scraper payload.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Script -->
    <script>
        let lastScrapedData = null;

        async function executeScraperWorkflow() {
            const webhookUrl = document.getElementById('webhookUrl').value.trim();
            const triggerBtn = document.getElementById('triggerBtn');
            const outputContainer = document.getElementById('outputContainer');

            if (!webhookUrl) {
                alert("Please enter a valid Webhook URL.");
                return;
            }

            // Update UI State
            triggerBtn.disabled = true;
            triggerBtn.classList.add('opacity-50', 'cursor-not-allowed');
            outputContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-64 font-mono text-emerald-400">
                    <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                    <p class="text-xs uppercase tracking-wider">// INGESTING TELEMETRY STREAM...</p>
                </div>
            `;

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ timestamp: new Date().toISOString(), source: 'dashboard_client' })
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                lastScrapedData = data;
                renderFixtures(data, false);

            } catch (err) {
                renderFixtures(err.message, true);
            } finally {
                triggerBtn.disabled = false;
                triggerBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function downloadData() {
            if (!lastScrapedData) return alert("No scraped telemetry available to export.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(lastScrapedData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `sports_analytics_${Date.now()}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function renderFixtures(data, isError) {
            const output = document.getElementById('outputContainer');
            if (isError) {
                output.innerHTML = `<div class="text-rose-500 font-mono p-4 bg-rose-950/20 border border-rose-900/50 rounded-xl text-xs">// ERROR: ${data}</div>`;
                return;
            }

            output.innerHTML = `
                <div class="space-y-4 font-sans">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                        <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider font-mono">// TELEMETRY INGESTED SUCCESSFULLY</h3>
                        <span class="text-[10px] bg-emerald-950 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded font-mono">LIVE FEED</span>
                    </div>
                    <pre class="bg-slate-900/90 p-4 rounded-xl text-emerald-400 text-xs overflow-x-auto font-mono border border-slate-800 max-h-[500px]">${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
        }
    </script>
</body>
</html>

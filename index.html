<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Analytics Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column;
            background-color: #02040e; position: relative; overflow: hidden;
        }

        /* CYBER MATRIX CANVAS STAGE */
        .cyber-backdrop-container {
            position: absolute; inset: 0; z-index: 0;
            background: radial-gradient(circle at center, #071235 0%, #02040e 100%);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #globeCanvasContainer {
            position: absolute; inset: 0; z-index: 2; width: 100%; height: 100%;
        }

        .hud-overlay {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 1; pointer-events: none;
        }

        .scanline {
            position: absolute; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #10b981, #00f2fe, #10b981, transparent);
            box-shadow: 0 0 20px #10b981; top: 0; z-index: 4;
            animation: scanning 3s linear infinite; pointer-events: none;
        }

        @keyframes scanning {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .cyber-backdrop-container.dashboard-active { opacity: 0.4; }
        .cyber-backdrop-container.dashboard-active .scanline { display: none; }

        .app-interface {
            opacity: 0; transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.1, 1, 0.1, 1), transform 1.2s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .app-interface.visible { opacity: 1; transform: translateY(0); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #059669; border-radius: 4px; }
    </style>
</head>
<body class="font-sans text-sm">

    <!-- SCRIPT PIPELINE LOGIC -->
    <script type="module">
        import { N8N_GATEWAY_WEBHOOK } from './config.js';

        let lastScrapedData = null;
        let cachedMatchesList = null;

        // THREE.JS CANVAS BACKGROUND
        let scene, camera, renderer, globeParticles;
        const clock = new THREE.Clock();
        const baseRadius = 50;
        const totalParticles = 2800;

        function buildEnergyNodeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.2, '#00f2fe');
            gradient.addColorStop(0.5, '#10b981');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function initGlobeSystem() {
            const container = document.getElementById('globeCanvasContainer');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalParticles * 3);
            const vectors = new Float32Array(totalParticles * 3);

            for(let i = 0; i < totalParticles; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                const x = Math.sin(phi) * Math.cos(theta);
                const y = Math.sin(phi) * Math.sin(theta);
                const z = Math.cos(phi);

                vectors[i * 3] = x;
                vectors[i * 3 + 1] = y;
                vectors[i * 3 + 2] = z;

                positions[i * 3] = x * baseRadius;
                positions[i * 3 + 1] = y * baseRadius;
                positions[i * 3 + 2] = z * baseRadius;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 2.2,
                transparent: true,
                opacity: 0.9,
                map: buildEnergyNodeTexture(),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            globeParticles = new THREE.Points(geometry, material);
            scene.add(globeParticles);

            animateGlobePipeline();
        }

        function animateGlobePipeline() {
            requestAnimationFrame(animateGlobePipeline);
            if (globeParticles) {
                globeParticles.rotation.y += 0.005;
                globeParticles.rotation.x += 0.002;
            }
            renderer.render(scene, camera);
        }

        // INITIALIZATION
        window.addEventListener('DOMContentLoaded', () => {
            initGlobeSystem();
            
            const stage = document.getElementById('backdropStage');
            const appFrame = document.getElementById('mainAppFrame');

            setTimeout(() => {
                stage.classList.add('dashboard-active');
                appFrame.classList.add('visible');
            }, 1000);

            // RENDER DEFAULT DEMO MATCH DETAIL MATRIX DIRECTLY
            renderDefaultMatchTelemetry();

            document.querySelectorAll('.cat-check').forEach(cb => {
                cb.addEventListener('change', (e) => handleCategoryTrigger(e.target));
            });

            document.getElementById('selectAllCatBtn').addEventListener('click', () => toggleAll('.cat-check', true));
            document.getElementById('selectAllLangBtn').addEventListener('click', () => toggleAll('.lang-check', true));
            document.getElementById('hotNewsBtn').addEventListener('click', getHotNews);
            document.getElementById('downloadBtn').addEventListener('click', downloadData);
        });

        function toggleAll(selector, isChecked) { 
            document.querySelectorAll(selector).forEach(c => c.checked = isChecked); 
        }

        function handleCategoryTrigger(checkboxEl) {
            if (!checkboxEl.checked) return;
            const mainCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);
            document.getElementById('activeSourceList').innerHTML = mainCats.map(item => 
                `<div class="p-2 bg-slate-900 rounded border border-emerald-500 text-emerald-300 font-mono text-xs">» ${item.toUpperCase()}</div>`
            ).join('');

            if (checkboxEl.value === 'international') {
                renderInternationalLeaguesMatrix();
            }
        }

                    </div>

                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs font-bold text-emerald-300 uppercase">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</span>
                                    <span class="text-[10px] bg-emerald-950 text-emerald-400 border border-emerald-500/40 px-2 py-0.5 rounded font-mono">EPL</span>
                                </div>
                                <p class="text-[11px] text-slate-400">English Premier League live matchday telemetry stream.</p>
                            </div>
                            <div class="mt-4 pt-2 border-t border-slate-800 flex justify-between items-center text-[10px] text-emerald-400 font-mono">

            output.innerHTML = `

                                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden flex">
                                    <div class="bg-emerald-500 h-full" style="width: 60%"></div>
                                    <div class="bg-cyan-500 h-full" style="width: 40%"></div>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between text-[11px] font-mono mb-1">
                                    <span class="text-emerald-400 font-bold">${matchData.cornerKicks.home}</span>
                                    <span class="text-slate-400 uppercase text-[10px]">Corner Kicks</span>
                                    <span class="text-cyan-400 font-bold">${matchData.cornerKicks.away}</span>
                                </div>
                                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden flex">
                                    <div class="bg-emerald-500 h-full" style="width: 70%"></div>
                                    <div class="bg-cyan-500 h-full" style="width: 30%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 4. GOALS & SUBSTITUTIONS GRID -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-4 shadow-md">
                            <h4 class="text-xs font-bold text-emerald-400 font-mono uppercase mb-3 flex items-center gap-2">
                                ⚽ GOALS & TIMINGS
                            </h4>
                            <div class="space-y-1">
                                ${goalsHtml}
                            </div>
                        </div>

                        <!-- SUBSTITUTIONS WITH PLAYER NAMES -->
                        <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-4 shadow-md">
                            <h4 class="text-xs font-bold text-cyan-400 font-mono uppercase mb-3 flex items-center gap-2">
                                🔄 SUBSTITUTIONS (OUT ➔ IN)
                            </h4>
                            <div class="space-y-1 max-h-[220px] overflow-y-auto pr-1">
                                ${subsHtml}
                            </div>
                        </div>
                    </div>

                    <!-- 5. PLAYER PERFORMANCE RATINGS SECTION -->
                    <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-4 shadow-md">
                        <h4 class="text-xs font-bold text-amber-400 font-mono uppercase mb-3 flex items-center gap-2">
                            ⭐ PLAYER PERFORMANCE RATINGS
                        </h4>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <div class="text-xs font-bold text-emerald-400 border-b border-slate-800 pb-1">${matchData.homeTeam}</div>
                                <div class="space-y-1.5">
                                    ${homeRatingsHtml}
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="text-xs font-bold text-cyan-400 border-b border-slate-800 pb-1">${matchData.awayTeam}</div>
                                <div class="space-y-1.5">
                                    ${awayRatingsHtml}
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            `;

            document.getElementById('navBackBtn')?.addEventListener('click', renderInternationalLeaguesMatrix);
        }

        async function getHotNews() {
            const queryVal = document.getElementById('hotNewsInput').value.trim();
            if (!queryVal) return alert("Please enter a sports topic.");
            alert(`Querying telemetry stream for: ${queryVal}`);
        }

        function downloadData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ status: "success" }, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `sports_analytics_${Date.now()}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>

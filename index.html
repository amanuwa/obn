<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- THREE.JS CORE ENGINE DEPENDENCY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            background-color: #000205;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* FULL-SCREEN 3D CANVAS LAYER */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Immersive Screen Edge Vignette Matrix Veil */
        .overlay-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 2, 5, 0) 20%, rgba(0, 2, 5, 0.5) 60%, rgba(0, 2, 5, 0.95) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .ui-container {
            position: relative;
            z-index: 2;
        }

        .glow-border:focus-within {
            border-color: #22d3ee;
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.6);
        }
        
        input:focus, select:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans flex items-center justify-center p-6">

    <!-- FULL SCREEN 3D LAYER PIPELINES -->
    <div id="canvas-container"></div>
    <div class="overlay-veil"></div>

    <div class="ui-container w-full max-w-md">

        <!-- SYSTEM STATUS NOTICE BUFFER -->
        <div id="statusBuffer" class="hidden text-xs p-3.5 rounded-xl border mb-4 bg-slate-950/90 backdrop-blur-xl font-mono transition-all duration-300"></div>

        <!-- SIGN UP PANEL -->
        <div id="signUpScreen" class="w-full bg-slate-950/75 backdrop-blur-2xl p-8 rounded-2xl shadow-2xl border border-slate-800/60 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-cyan-400 via-sky-500 to-indigo-500"></div>

            <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
                Initialize Agent Access
            </h2>
            <p class="text-xs text-cyan-400 text-center uppercase tracking-widest font-mono mb-6">Create Journalist Security Profile</p>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                    <div class="glow-border flex items-center bg-slate-900/80 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">👤</span>
                        <input type="text" id="regName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalism Assigned Sector</label>
                    <div class="glow-border flex items-center bg-slate-900/80 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🗂️</span>
                        <select id="regSection" required class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 cursor-pointer text-slate-300">
                            <option value="" disabled selected class="bg-slate-950 text-slate-500">Select Sector...</option>
                            <option value="world politics and governance" class="bg-slate-950 text-white">World Politics and Governance</option>
                            <option value="sports & analytics" class="bg-slate-950 text-white">Sports & Analytics</option>
                            <option value="business and finance" class="bg-slate-950 text-white">Business and Finance</option>
                            <option value="general hot news" class="bg-slate-950 text-white">General Hot News</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Secure Access Password</label>
                    <div class="glow-border flex items-center bg-slate-900/80 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                        <input type="password" id="regPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                    </div>
                </div>

                <button id="signUpBtn" class="w-full bg-gradient-to-r from-cyan-600 via-sky-600 to-blue-700 hover:from-cyan-500 hover:via-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-cyan-500/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                    Sign Up
                </button>

                <div class="text-center mt-4">
                    <p class="text-xs text-slate-400">Already registered? <button id="toSignInBtn" class="text-cyan-400 hover:underline font-mono bg-transparent border-0 cursor-pointer p-0">Secure Log In</button></p>
                </div>
            </div>
        </div>

        <!-- SIGN IN PANEL -->
        <div id="signInScreen" class="hidden w-full bg-slate-950/75 backdrop-blur-2xl p-8 rounded-2xl shadow-2xl border border-slate-800/60 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-cyan-400 to-indigo-600"></div>

            <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
                Operator Portal
            </h2>
            <p class="text-xs text-cyan-400 text-center uppercase tracking-widest font-mono mb-6">Authenticate Credentials</p>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Journalist Full Name</label>
                    <div class="glow-border flex items-center bg-slate-900/80 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">👤</span>
                        <input type="text" id="loginName" required placeholder="Full Name" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Access Password</label>
                    <div class="glow-border flex items-center bg-slate-900/80 border border-slate-800 rounded-lg p-3 transition-all duration-200">
                        <span class="text-slate-500 mr-2.5 select-none">🔑</span>
                        <input type="password" id="loginPassword" required placeholder="Password" class="w-full bg-transparent text-white text-sm focus:outline-none border-0 m-0 p-0 font-mono tracking-widest">
                    </div>
                </div>

                <button id="signInBtn" class="w-full bg-gradient-to-r from-cyan-600 via-sky-600 to-blue-700 hover:from-cyan-500 hover:via-sky-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-xl shadow-cyan-500/20 active:scale-[0.99] mt-4 font-mono uppercase text-xs tracking-wider cursor-pointer">
                    Sign In
                </button>

                <div class="text-center mt-4">
                    <button id="toSignUpBtn" class="text-xs text-cyan-400 hover:underline font-mono bg-transparent border-0 cursor-pointer p-0">Initialize Access Profile</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPT INFRASTRUCTURE MODULE -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
        import { DESK_CONFIGS } from './deskConfigs.js';

        // --- 2060 QUANTUM TIMELINE ENGINE SYSTEM ---
        let scene, camera, renderer, globeGroup, coreMesh, matrixShell, coreNodes, quantumExplosionArrays;
        let clock = new THREE.Clock();
        
        // Canvas particle texture generator 
        function createEnergyNodeTexture(coreColor, edgeColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.2, coreColor);
            gradient.addColorStop(0.5, edgeColor);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function initQuantumFieldSystem() {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            scene = new THREE.Scene();
            
            // Expanded viewing field to catch full screen canvas margins
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 220;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            globeGroup = new THREE.Group();

            const coreRadius = 45;
            const segmentResolutions = 32;

            // 1. Central Core Energy Field
            const coreGeo = new THREE.SphereGeometry(coreRadius - 3, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0x083344,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            coreMesh = new THREE.Mesh(coreGeo, coreMat);
            globeGroup.add(coreMesh);

            // 2. Structural Wireframe Globe Matrix Layer
            const structuralGeo = new THREE.SphereGeometry(coreRadius, segmentResolutions, segmentResolutions);
            const wireMat = new THREE.MeshBasicMaterial({
                color: 0x06b6d4,
                wireframe: true,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending
            });
            matrixShell = new THREE.Mesh(structuralGeo, wireMat);
            globeGroup.add(matrixShell);

            // 3. Stationary Junction Core Nodes
            const coreNodeMat = new THREE.PointsMaterial({
                size: 3.8,
                transparent: true,
                opacity: 0.95,
                map: createEnergyNodeTexture('#22d3ee', '#0e7490'),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            coreNodes = new THREE.Points(structuralGeo, coreNodeMat);
            globeGroup.add(coreNodes);

            // 4. THE QUANTUM EXPLOSION ARRAYS (Tethered to Globe Cycle)
            const arrayParticleCount = 3500;
            const arrayGeometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(arrayParticleCount * 3);
            const originalVectors = new Float32Array(arrayParticleCount * 3);
            const travelSpeeds = new Float32Array(arrayParticleCount);

            for (let i = 0; i < arrayParticleCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                const vx = Math.sin(phi) * Math.cos(theta);
                const vy = Math.sin(phi) * Math.sin(theta);
                const vz = Math.cos(phi);

                originalVectors[i * 3] = vx;
                originalVectors[i * 3 + 1] = vy;
                originalVectors[i * 3 + 2] = vz;

                // Position them perfectly on the outer shell of the globe radius at birth
                positions[i * 3] = vx * coreRadius;
                positions[i * 3 + 1] = vy * coreRadius;
                positions[i * 3 + 2] = vz * coreRadius;

                travelSpeeds[i] = 0.4 + Math.random() * 2.0;
            }

            arrayGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const arrayNodeMat = new THREE.PointsMaterial({
                size: 2.5,
                transparent: true,
                opacity: 0.95,
                map: createEnergyNodeTexture('#ffffff', '#3b82f6'),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            quantumExplosionArrays = new THREE.Points(arrayGeometry, arrayNodeMat);
            quantumExplosionArrays.userData = {
                vectors: originalVectors,
                speeds: travelSpeeds,
                cycleTimer: 0
            };
            
            globeGroup.add(quantumExplosionArrays);

            // 5. Ambient Background Spatial Field
            const ambientCount = 300;
            const ambientGeo = new THREE.BufferGeometry();
            const ambientPositions = new Float32Array(ambientCount * 3);
            for(let i=0; i<ambientCount; i++) {
                ambientPositions[i*3] = (Math.random() - 0.5) * 700;
                ambientPositions[i*3+1] = (Math.random() - 0.5) * 700;
                ambientPositions[i*3+2] = (Math.random() - 0.5) * 400;
            }
            ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
            const ambientMat = new THREE.PointsMaterial({
                size: 1.5,
                color: 0x0ea5e9,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending
            });
            const ambientSpace = new THREE.Points(ambientGeo, ambientMat);
            scene.add(ambientSpace);

            scene.add(globeGroup);
            animateQuantumPipeline();
        }

        function animateQuantumPipeline() {
            requestAnimationFrame(animateQuantumPipeline);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Continuous rotation base metrics
            if (globeGroup) {
                globeGroup.rotation.y += 0.012;
                globeGroup.rotation.x += 0.004;
            }

            // Pulse the central cluster engine
            if (coreMesh) {
                const pulse = 1.0 + Math.sin(elapsed * 4.0) * 0.06;
                coreMesh.scale.set(pulse, pulse, pulse);
            }

            // PHASE SCHEDULER (8 second total duration cycle loop)
            if (quantumExplosionArrays) {
                const positions = quantumExplosionArrays.geometry.attributes.position.array;
                const vectors = quantumExplosionArrays.userData.vectors;
                const speeds = quantumExplosionArrays.userData.speeds;
                
                quantumExplosionArrays.userData.cycleTimer += delta;
                const loopTime = quantumExplosionArrays.userData.cycleTimer % 8; 

                const coreRadius = 45;

                if (loopTime < 1) {
                    // --- PHASE 1: STABLE ROTATING GLOBE (Exactly 1 Second) ---
                    matrixShell.material.opacity = 0.25;
                    coreNodes.material.opacity = 0.95;
                    coreMesh.material.opacity = 0.4;

                    for (let i = 0; i < speeds.length; i++) {
                        const vx = vectors[i * 3];
                        const vy = vectors[i * 3 + 1];
                        const vz = vectors[i * 3 + 2];
                        
                        positions[i * 3] = vx * coreRadius;
                        positions[i * 3 + 1] = vy * coreRadius;
                        positions[i * 3 + 2] = vz * coreRadius;
                    }
                } 
                else if (loopTime >= 1 && loopTime < 3) {
                    // --- PHASE 2: SCATTER ALL OVER THE SCREEN (2 Seconds) ---
                    const progress = (loopTime - 1) / 2; // Normalize to 0-1
                    matrixShell.material.opacity = 0.25 * (1.0 - progress);
                    coreNodes.material.opacity = 0.95 * (1.0 - progress);
                    coreMesh.material.opacity = 0.4 * (1.0 - progress);

                    for (let i = 0; i < speeds.length; i++) {
                        const vx = vectors[i * 3];
                        const vy = vectors[i * 3 + 1];
                        const vz = vectors[i * 3 + 2];
                        const pSpeed = speeds[i];

                        // Instantly fire vectors away across structural viewport metrics
                        const burstRange = coreRadius + (progress * 400 * pSpeed);
                        
                        positions[i * 3] = vx * burstRange + Math.sin(elapsed * pSpeed * 2) * 20;
                        positions[i * 3 + 1] = vy * burstRange + Math.cos(elapsed * pSpeed * 2) * 20;
                        positions[i * 3 + 2] = vz * burstRange;
                    }
                } 
                else {
                    // --- PHASE 3: RETURN BACK TO ROTATING GLOBE FORM (5 Seconds) ---
                    const returnProgress = (loopTime - 3) / 5; // Normalize to 0-1 over 5s
                    
                    matrixShell.material.opacity = 0.25 * returnProgress;
                    coreNodes.material.opacity = 0.95 * returnProgress;
                    coreMesh.material.opacity = 0.4 * returnProgress;

                    for (let i = 0; i < speeds.length; i++) {
                        const vx = vectors[i * 3];
                        const vy = vectors[i * 3 + 1];
                        const vz = vectors[i * 3 + 2];

                        const currentX = positions[i * 3];
                        const currentY = positions[i * 3 + 1];
                        const currentZ = positions[i * 3 + 2];
                        
                        const targetX = vx * coreRadius;
                        const targetY = vy * coreRadius;
                        const targetZ = vz * coreRadius;

                        positions[i * 3] = THREE.MathUtils.lerp(currentX, targetX, returnProgress);
                        positions[i * 3 + 1] = THREE.MathUtils.lerp(currentY, targetY, returnProgress);
                        positions[i * 3 + 2] = THREE.MathUtils.lerp(currentZ, targetZ, returnProgress);
                    }
                }
                quantumExplosionArrays.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Fire Quantum Terminal Engine System
        initQuantumFieldSystem();

        // --- AUTHENTICATION INTERACTION INFRASTRUCTURE ---
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true },
            global: {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        });

        const statusBuffer = document.getElementById('statusBuffer');

        function displayTerminalNotice(message, statusType = 'info') {
            statusBuffer.classList.remove('hidden', 'text-cyan-400', 'border-cyan-950/60', 'text-red-400', 'border-red-950/60', 'text-emerald-400', 'border-emerald-950/60');
            
            if (statusType === 'error') {
                statusBuffer.classList.add('text-red-400', 'border-red-950/60');
            } else if (statusType === 'success') {
                statusBuffer.classList.add('text-emerald-400', 'border-emerald-950/60');
            } else {
                statusBuffer.classList.add('text-cyan-400', 'border-cyan-950/60');
            }
            statusBuffer.innerText = `// ${message.toUpperCase()}`;
        }

        function showScreen(screenId) {
            statusBuffer.classList.add('hidden');
            document.getElementById('signUpScreen').classList.add('hidden');
            document.getElementById('signInScreen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        document.getElementById('toSignInBtn').addEventListener('click', () => showScreen('signInScreen'));
        document.getElementById('toSignUpBtn').addEventListener('click', () => showScreen('signUpScreen'));
        document.getElementById('signUpBtn').addEventListener('click', registerJournalist);
        document.getElementById('signInBtn').addEventListener('click', loginJournalist);

        async function registerJournalist() {
            const fullName = document.getElementById('regName').value.trim();
            const section = document.getElementById('regSection').value;
            const password = document.getElementById('regPassword').value;
            const signUpBtn = document.getElementById('signUpBtn');

            if (!fullName || !section || !password) {
                displayTerminalNotice("Registration Error: All parameters required.", "error");
                return;
            }

            signUpBtn.disabled = true;
            signUpBtn.innerText = "Processing Profile...";

            try {
                const { data: existingUsers, error: checkError } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', fullName);

                if (checkError) throw checkError;
                if (existingUsers && existingUsers.length > 0) {
                    displayTerminalNotice(`Registration failure: Name "${fullName}" is taken.`, "error");
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    return; 
                }

                const { error: insertError } = await supabaseClient
                    .from('journalists')
                    .insert([{"Journalist name": fullName, "journalism Section": section, "Password": password}]);

                if (insertError) throw insertError;

                displayTerminalNotice("Profile Compiled! Switching to authentication panel...", "success");
                setTimeout(() => {
                    statusBuffer.classList.add('hidden');
                    document.getElementById('loginName').value = fullName;
                    signUpBtn.disabled = false;
                    signUpBtn.innerText = "Sign Up";
                    showScreen('signInScreen');
                }, 1500);

            } catch (error) {
                displayTerminalNotice("Database Core Error: " + error.message, "error");
                signUpBtn.disabled = false;
                signUpBtn.innerText = "Sign Up";
            }
        }

        async function loginJournalist() {
            const nameInput = document.getElementById('loginName').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;
            const signInBtn = document.getElementById('signInBtn');

            if (!nameInput || !passwordInput) {
                displayTerminalNotice("Authentication Error: Credentials missing.", "error");
                return;
            }

            signInBtn.disabled = true;
            signInBtn.innerText = "Authenticating...";

            try {
                const { data: records, error } = await supabaseClient
                    .from('journalists')
                    .select('*')
                    .eq('Journalist name', nameInput);

                if (error) throw error;
                if (!records || records.length === 0 || records[0].Password !== passwordInput) {
                    displayTerminalNotice("Authentication Error: Invalid identity passkey.", "error");
                    signInBtn.disabled = false;
                    signInBtn.innerText = "Sign In";
                    return;
                }

                const assignedSection = records[0]["journalism Section"];
                const configMatch = DESK_CONFIGS[assignedSection];

                if (configMatch) {
                    displayTerminalNotice(`Access Granted! Routing to: ${configMatch.title}`, "success");
                } else {
                    displayTerminalNotice("Access Granted! Establishing session tunnel...", "success");
                }

                document.getElementById('loginPassword').value = ""; 

                setTimeout(() => {
                    signInBtn.disabled = false;
                    signInBtn.innerText = "Sign In";
                    window.location.href = 'customepage.html';
                }, 1200);

            } catch (error) {
                displayTerminalNotice("Security Subsystem Error: " + error.message, "error");
                signInBtn.disabled = false;
                signInBtn.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Intel | Business Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; background-color: #02071a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; }
    </style>
</head>
<body class="font-sans">

    <header class="bg-slate-950/60 border-b border-slate-800 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-xs">FI</div>
            <span class="font-bold text-slate-100 tracking-tight">Financial Intelligence Terminal</span>
        </div>
        <a href="index.html" class="text-xs text-slate-400 hover:text-white">← Back to Login</a>
    </header>

    <main class="flex-1 grid grid-cols-4 gap-0 p-4 h-full">
        <!-- SIDEBAR -->
        <div class="col-span-1 bg-slate-950/50 p-6 border-r border-slate-800 flex flex-col">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4">Financial Sectors</h3>
            
            <div id="categoryContainer" class="space-y-4 mb-6">
                <!-- Ethiopian News Section -->
                <div>
                    <label class="block bg-slate-800 hover:bg-slate-700 border border-slate-600 p-3 rounded cursor-pointer transition-all">
                        <input type="checkbox" id="ethToggle" class="cat-check" value="ethiopian"> <span class="text-xs font-bold uppercase ml-2">Ethiopian news</span>
                    </label>
                    <div id="ethSources" class="hidden mt-2 ml-4 space-y-1 border-l border-slate-700 pl-3"></div>
                </div>

                <!-- International Section -->
                <div>
                    <label class="block bg-slate-800 hover:bg-slate-700 border border-slate-600 p-3 rounded cursor-pointer transition-all">
                        <input type="checkbox" id="intToggle" class="cat-check" value="international"> <span class="text-xs font-bold uppercase ml-2">International</span>
                    </label>
                    <div id="intSources" class="hidden mt-2 ml-4 space-y-1 border-l border-slate-700 pl-3"></div>
                </div>
            </div>
            
            <div class="flex-1 bg-slate-900/50 rounded-xl border border-slate-800 p-4 mb-4 overflow-y-auto">
                <h3 class="text-[9px] font-bold text-slate-400 uppercase mb-3">Active Data Streams</h3>
                <div id="activeSourceList" class="space-y-2 font-mono text-[10px] text-slate-400 italic">// Awaiting stream...</div>
            </div>

            <button id="runBtn" class="w-full bg-blue-600 p-4 rounded-xl font-black text-xs uppercase hover:bg-blue-500 transition-all">Initialize Pipeline</button>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-span-3 bg-slate-950/50 p-6 flex flex-col h-full">
            <h3 class="font-bold text-sm text-slate-300 mb-4">Financial Intelligence Matrix</h3>
            
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full mb-4">
                <h3 class="text-[9px] font-bold text-red-500 uppercase mb-2">Fast Hot News</h3>
                <div class="flex gap-2">
                    <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950 border border-slate-800 rounded p-2 text-[10px] text-white focus:border-red-500 outline-none">
                    <button onclick="getHotNews()" class="bg-red-600 px-4 py-1 rounded font-bold text-[10px] uppercase hover:bg-red-500">Go</button>
                </div>
            </div>

            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full flex items-center gap-4 mb-4">
                <button onclick="toggleAll('.lang-check', true)" class="bg-blue-900/30 hover:bg-blue-600 border border-blue-500/50 text-blue-400 hover:text-white px-4 py-2 rounded font-black text-[10px] uppercase transition-all">Select All</button>
                <div class="flex gap-4 flex-wrap">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="oromiffa"> <span class="text-xs font-bold uppercase">Oromiffa</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="amharic"> <span class="text-xs font-bold uppercase">Amharic</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="english"> <span class="text-xs font-bold uppercase">English</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="arabic"> <span class="text-xs font-bold uppercase">Arabic</span></label>
                </div>
            </div>

            <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950 rounded-lg p-6 border border-slate-900 font-mono text-xs text-blue-400 shadow-inner">
                <p class="text-slate-600 italic">// System ready for financial data...</p>
            </div>
        </div>
    </main>

    <script>
        // Supabase Initialization
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        // Dynamic Loading from Database
        async function loadSourcesFromDB() {
            const { data: ethData } = await supabase.from('Ethiopian -Business and finance websites').select('website_source, websites');
            const { data: intData } = await supabase.from('business and finance -websites').select('website_source, websites');

            const buildList = (data, containerId, className) => {
                const container = document.getElementById(containerId);
                data.forEach(item => {
                    const label = document.createElement('label');
                    label.className = "block text-[10px]";
                    label.innerHTML = `<input type="checkbox" class="${className}" value="${item.websites}"> ${item.website_source}`;
                    container.appendChild(label);
                });
            };

            if (ethData) buildList(ethData, 'ethSources', 'eth-src');
            if (intData) buildList(intData, 'intSources', 'int-src');
        }

        loadSourcesFromDB();

        // UI Functions
        function toggleAll(selector, isChecked) { document.querySelectorAll(selector).forEach(c => c.checked = isChecked); }
        
        document.getElementById('ethToggle').addEventListener('change', (e) => document.getElementById('ethSources').classList.toggle('hidden', !e.target.checked));
        document.getElementById('intToggle').addEventListener('change', (e) => document.getElementById('intSources').classList.toggle('hidden', !e.target.checked));

        function getHotNews() { document.getElementById('outputContainer').innerHTML = `<div class="text-blue-500">// Fetching financial news...</div>`; }
        
        document.getElementById('runBtn').onclick = () => {
            const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).filter(c => c.className.includes('-src')).map(c => c.parentElement.textContent.trim());
            const sourceList = document.getElementById('activeSourceList');
            const output = document.getElementById('outputContainer');

            if (selected.length === 0) return alert("Select at least one source.");
            
            sourceList.innerHTML = selected.map(item => `<div class="p-2 bg-slate-800 rounded border-l-2 border-blue-500 text-blue-300">» ${item}</div>`).join('');
            output.innerHTML = `<div class="text-blue-400 font-mono">// PIPELINE ACTIVE<br>// SOURCES: ${selected.join(', ')}</div>`;
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #02040a;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FIXED CYBER SPHERE BACKGROUND */
        .globe-background {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vmax;
            height: 100vmax;
            transform: translate(-50%, -50%);
            background-image: url('Screenshot 2026-07-08 004611_2.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 0;
            animation: rotateGlobe 60s linear infinite;
        }

        @keyframes rotateGlobe {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* FOREGROUND UI CONTAINER */
        .ui-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <!-- THE CYBER SPHERE -->
    <div class="globe-background"></div>

    <!-- YOUR AUTHENTICATION PORTAL -->
    <div class="ui-container bg-slate-950/80 backdrop-blur-md p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <h2 class="text-white text-center font-bold text-xl mb-6">Operator Portal</h2>
        
        <div class="space-y-4">
            <input type="text" placeholder="Journalist Name" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
            <input type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
            <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">AUTHENTICATE</button>
        </div>
    </div>

</body>
</html>

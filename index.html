<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #02040a;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* REVOLVING BACKGROUND LAYER */
        .rotating-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            background-image: url('Screenshot 2026-07-05 050457_4.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
            animation: spinBg 120s linear infinite;
        }

        @keyframes spinBg {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Overlay for contrast */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(2, 4, 10, 0.3) 0%, rgba(2, 4, 10, 0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 2;
        }

        .glow-border:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="text-slate-100 font-sans">

    <!-- Background Components -->
    <div class="rotating-bg"></div>
    <div class="bg-overlay"></div>

    <!-- Main Content Container -->
    <div class="content-layer min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-slate-950/85 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-sky-500/20">
            <h2 class="text-2xl font-black text-center text-white tracking-tight mb-1">
                Initialize Agent Access
            </h2>
            <p class="text-xs text-sky-400 text-center uppercase tracking-widest font-mono mb-6">Create Journalist Security Profile</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Journalist Full Name</label>
                    <div class="glow-border bg-slate-950 border border-slate-800 rounded-lg p-3">
                        <input type="text" placeholder="Full Name" class="w-full bg-transparent focus:outline-none text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Journalism Assigned Sector</label>
                    <div class="glow-border bg-slate-950 border border-slate-800 rounded-lg p-3">
                        <select class="w-full bg-transparent focus:outline-none text-sm text-slate-300">
                            <option>Select Sector...</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Secure Access Password</label>
                    <div class="glow-border bg-slate-950 border border-slate-800 rounded-lg p-3">
                        <input type="password" placeholder="Password" class="w-full bg-transparent focus:outline-none text-sm">
                    </div>
                </div>

                <button class="w-full bg-gradient-to-r from-sky-600 to-blue-700 py-3.5 rounded-lg font-bold text-sm uppercase tracking-wider mt-4">
                    Sign Up
                </button>
                
                <p class="text-center text-xs text-slate-400 mt-4">Already registered? <a href="#" class="text-sky-400">Secure Log In</a></p>
            </div>
        </div>
    </div>
</body>
</html>

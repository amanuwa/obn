<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Access Terminal</title>
    <style>
        body {
            background-color: #02040a;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CSS-ONLY GLOWING GLOBE */
        .globe-container {
            position: fixed;
            z-index: 1;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            /* Radiant grid effect */
            background: radial-gradient(circle at 30% 30%, #38bdf8, #0f172a 70%);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 50px rgba(56, 189, 248, 0.3);
            animation: rotateGlobe 10s linear infinite;
        }

        @keyframes rotateGlobe {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ui-container {
            position: relative;
            z-index: 2;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- This will now definitely appear as a glowing rotating orb -->
    <div class="globe-container"></div>

    <div class="ui-container">
        <h1>TERMINAL ACTIVE</h1>
    </div>

</body>
</html>

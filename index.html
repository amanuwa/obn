<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Intel | Business Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase CDN Script (creates global 'supabase' window reference) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; background-color: #02071a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; }
    </style>
</head>
<body class="font-sans">

    <!-- HEADER LOGO BAR -->
    <header class="bg-slate-950/60 border-b border-slate-800 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-xs">FI</div>
            <span class="font-bold text-slate-100 tracking-tight">Financial Intelligence Terminal</span>
        </div>
        <a href="index.html" class="text-xs text-slate-400 hover:text-white">← Back to Login</a>
    </header>

    <!-- MAIN INTERFACE MATRIX -->
    <main class="flex-1 grid grid-cols-4 gap-0 p-4 h-full overflow-hidden">
        
        <!-- LEFT CONTROL DRAWER: SECTORS & SOURCES -->
        <div class="col-span-1 bg-slate-950/50 p-6 border-r border-slate-800 flex flex-col h-full overflow-y-auto">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4">Financial Sectors</h3>
            
            <div id="categoryContainer" class="space-y-4 mb-6">
                <!-- ETHIOPIAN DISPATCH NO DEPT -->
                <div>
                    <label class="block bg-slate-800 hover:bg-slate-700 border border-slate-600 p-3 rounded cursor-pointer transition-all">
                        <input type="checkbox" id="ethToggle" class="cat-check" value="ethiopian"> <span class="text-xs font-bold uppercase ml-2">Ethiopian news</span>
                    </label>
                    <div id="ethSources" class="hidden mt-2 ml-4 space-y-1 border-l border-slate-700 pl-3"></div>
                </div>

                <!-- INTERNATIONAL DISPATCH DEPT -->
                <div>
                    <label class="block bg-slate-800 hover:bg-slate-700 border border-slate-600 p-3 rounded cursor-pointer transition-all">
                        <input type="checkbox" id="intToggle" class="cat-check" value="international"> <span class="text-xs font-bold uppercase ml-2">International</span>
                    </label>
                    <div id="intSources" class="hidden mt-2 ml-4 space-y-1 border-l border-slate-700 pl-3"></div>
                </div>
            </div>
            
            <!-- STREAM MONITOR FEED -->
            <div class="flex-1 bg-slate-900/50 rounded-xl border border-slate-800 p-4 mb-4 overflow-y-auto">
                <h3 class="text-[9px] font-bold text-slate-400 uppercase mb-3">Active Data Streams</h3>
                <div id="activeSourceList" class="space-y-2 font-mono text-[10px] text-slate-400 italic">// Awaiting stream...</div>
            </div>

            <button id="runBtn" class="w-full bg-blue-600 p-4 rounded-xl font-black text-xs uppercase hover:bg-blue-500 transition-all cursor-pointer">Initialize Pipeline</button>
        </div>

        <!-- RIGHT RUN TIME VIEWER: FEED MATRIX -->
        <div class="col-span-3 bg-slate-950/50 p-6 flex flex-col h-full overflow-y-auto">
            <h3 class="font-bold text-sm text-slate-300 mb-4">Financial Intelligence Matrix</h3>
            
            <!-- FAST INTEL BAR -->
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full mb-4">
                <h3 class="text-[9px] font-bold text-red-500 uppercase mb-2">Fast Hot News</h3>
                <div class="flex gap-2">
                    <input type="text" id="hotNewsInput" placeholder="Enter topic..." class="flex-1 bg-slate-950 border border-slate-800 rounded p-2 text-[10px] text-white focus:border-red-500 outline-none">
                    <button id="hotNewsBtn" class="bg-red-600 px-4 py-1 rounded font-bold text-[10px] uppercase hover:bg-red-500 cursor-pointer">Go</button>
                </div>
            </div>

            <!-- REGIONAL LANGUAGE FILTER TOOL -->
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full flex items-center gap-4 mb-4">
                <button id="selectAllBtn" class="bg-blue-900/30 hover:bg-blue-600 border border-blue-500/50 text-blue-400 hover:text-white px-4 py-2 rounded font-black text-[10px] uppercase transition-all cursor-pointer">Select All</button>
                <div class="flex gap-4 flex-wrap">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="oromiffa"> <span class="text-xs font-bold uppercase">Oromiffa</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="amharic"> <span class="text-xs font-bold uppercase">Amharic</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="english"> <span class="text-xs font-bold uppercase">English</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="lang-check" value="arabic"> <span class="text-xs font-bold uppercase">Arabic</span></label>
                </div>
            </div>

            <!-- CONSOLE OUTPUT MONITOR -->
            <div id="outputContainer" class="flex-1 overflow-y-auto bg-slate-950 rounded-lg p-6 border border-slate-900 font-mono text-xs text-blue-400 shadow-inner">
                <p class="text-slate-600 italic">// System ready for financial data...</p>
            </div>
        </div>
    </main>

    <!-- BACKEND APPLICATION TRANS-LAYER -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

        // RESOLVED: Use distinct instanced name 'supabaseClient' to bypass global script namespace crash
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        });

        async function loadSourcesFromDB() {
            try {
                // FIXED: Querying strict lowercase column case "websites" to match table schemas
                const { data: ethData, error: ethErr } = await supabaseClient
                    .from('Ethiopian -Business and finance websites')
                    .select('"Website -source", websites');
                    
                const { data: intData, error: intErr } = await supabaseClient
                    .from('business and finance -websites')
                    .select('"website Source", websites');

                if(ethErr) console.error("Ethiopian Database Load Error:", ethErr);
                if(intErr) console.error("International Database Load Error:", intErr);

                const buildList = (data, containerId, className, colName) => {
                    const container = document.getElementById(containerId);
                    if (!data) return;
                    container.innerHTML = ''; // Wipe pre-loader lines safely
                    
                    data.forEach(item => {
                        const label = document.createElement('label');
                        label.className = "flex items-center gap-2 text-[10px] py-1 cursor-pointer hover:text-blue-400 text-slate-300 transition-colors";
                        label.innerHTML = `<input type="checkbox" class="${className}" value="${item.websites}"> <span>${item[colName]}</span>`;
                        container.appendChild(label);
                    });
                };

                // Generate runtime elements from payload array
                buildList(ethData, 'ethSources', 'eth-src', 'Website -source');
                buildList(intData, 'intSources', 'int-src', 'website Source');
                
            } catch (err) {
                console.error("Critical structural execution error:", err);
            }
        }

        // Run client transaction payload download
        loadSourcesFromDB();

        // UI ACTIONS: Interactive drop drawer animations
        document.getElementById('ethToggle').addEventListener('change', (e) => {
            document.getElementById('ethSources').classList.toggle('hidden', !e.target.checked);
        });
        
        document.getElementById('intToggle').addEventListener('change', (e) => {
            document.getElementById('intSources').classList.toggle('hidden', !e.target.checked);
        });

        // Language Bulk Filter Tool
        document.getElementById('selectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.lang-check').forEach(c => c.checked = true);
        });

        // Fast Hot News Mock Stream Handler
        document.getElementById('hotNewsBtn').addEventListener('click', () => {
            const topic = document.getElementById('hotNewsInput').value.trim();
            document.getElementById('outputContainer').innerHTML = `<div class="text-red-400 font-mono">// INTEL CHANNELS INITIALIZED FOR SEARCH MATRIX: ${topic || 'GLOBAL RUN'}...</div>`;
        });
        
        // Main Stream Activation Pipeline Compiler
        document.getElementById('runBtn').onclick = () => {
            const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                .filter(c => c.className.includes('-src'))
                .map(c => c.parentElement.querySelector('span').textContent.trim());
            
            if (selected.length === 0) return alert("Error: Select at least one active pipeline node.");
            
            document.getElementById('activeSourceList').innerHTML = selected.map(item => `<div class="p-2 bg-slate-900 rounded border-l-2 border-blue-500 text-blue-300 font-mono">» ${item}</div>`).join('');
            document.getElementById('outputContainer').innerHTML = `<div class="text-emerald-400 font-mono">// PIPELINE ACTIVE & AUTHENTICATED WITH POSTGREST LAYER<br>// STREAM NODES LISTENING: ${selected.join(', ')}</div>`;
        };
    </script>
</body>
</html>
